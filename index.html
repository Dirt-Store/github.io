<!DOCTYPE html>
<html lang="en" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dirt Store | Super Admin System</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #f8f9fa; --text: #212529; --primary: #2e8b57;
            --card: #ffffff; --border: #dee2e6; --glow-val: 10px;
        }
        body.dark-mode { --bg: #121212; --text: #e9ecef; --card: #1e1e1e; --border: #333; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: 0.3s; }
        header { 
            background: var(--card); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 1000;
        }
        .brand { display: flex; align-items: center; gap: 10px; }
        .logo-img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); }
        .host-name { font-size: 22px; font-weight: bold; color: var(--primary); text-shadow: 0 0 var(--glow-val) var(--primary); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid var(--border); transition: 0.2s; text-align: center; padding-bottom: 10px; }
        .card img { width: 100%; height: 160px; object-fit: cover; }
        .sidebar { position: fixed; top: 0; right: -320px; width: 280px; height: 100%; background: var(--card); z-index: 2000; padding: 20px; transition: 0.3s; box-shadow: -5px 0 15px rgba(0,0,0,0.2); }
        .sidebar.active { right: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 1500; }
        .btn { width: 100%; padding: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin: 5px 0; }
        .btn-main { background: var(--primary); color: white; }
        .btn-danger { background: #dc3545; color: white; }
        input, select { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); box-sizing: border-box; }
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card); padding: 20px; border-radius: 20px; width: 90%; max-width: 450px; z-index: 3000; display: none; box-shadow: 0 10px 40px rgba(0,0,0,0.4); max-height: 80vh; overflow-y: auto; }
        .hidden { display: none !important; }
    </style>
</head>
<body onload="init()">

    <header>
        <button class="btn" style="width:auto; font-size:24px; background:none; color:var(--text);" onclick="toggleSidebar()">☰</button>
        <div class="brand">
            <img id="storeLogo" class="logo-img" src="https://via.placeholder.com/40">
            <div id="storeTitle" class="host-name">Dirt Store</div>
        </div>
        <button id="themeToggle" style="background:none; border:none; font-size:24px; cursor:pointer;" onclick="toggleMode()">☀️</button>
    </header>

    <div id="overlay" class="overlay" onclick="closeAll()"></div>

    <div id="sidebar" class="sidebar">
        <h3 id="userLabel">Welcome</h3>
        <hr>
        <div id="adminPanel" class="hidden">
            <p style="color:var(--primary); font-weight:bold;">Management Tools:</p>
            <button id="storeManageBtn" class="btn btn-main hidden" onclick="openStoreManager()">Manage Store</button>
            <button id="adminManageBtn" class="btn btn-main hidden" onclick="openAdminManager()">Manage Admins</button>
        </div>
        <button class="btn btn-danger" style="margin-top:20px;" onclick="logout()">Logout</button>
    </div>

    <div id="mainApp" class="hidden">
        <div class="grid" id="productGrid"></div>
        <button id="addBtn" class="btn-main hidden" style="position:fixed; bottom:20px; left:20px; width:60px; height:60px; border-radius:50%; font-size:30px; z-index:1000;" onclick="showAddModal()">+</button>
    </div>

    <div id="loginPage" style="display:flex; height:90vh; align-items:center; justify-content:center; padding:20px;">
        <div style="background:var(--card); padding:30px; border-radius:20px; width:100%; max-width:350px; text-align:center; border:1px solid var(--border);">
            <h2 style="color:var(--primary);">Login</h2>
            <input type="text" id="uIn" placeholder="Username">
            <input type="password" id="pIn" placeholder="Password">
            <button class="btn btn-main" onclick="login()">Login</button>
        </div>
    </div>

    <div id="storeModal" class="modal">
        <h3>Store Settings</h3>
        <input type="text" id="setStoreName" placeholder="Store Name">
        <p>Logo:</p> <input type="file" id="setStoreLogo" accept="image/*">
        <p>Theme Color:</p> <input type="color" id="setStoreColor">
        <p>Glow Power:</p> <input type="number" id="setStoreGlow">
        <button class="btn btn-main" onclick="updateStoreSettings()">Save Changes</button>
        <button class="btn" onclick="closeAll()">Cancel</button>
    </div>

    <div id="adminModal" class="modal">
        <h3>Admins Control</h3>
        <div id="adminList"></div>
        <hr>
        <h4>Add / Edit Admin</h4>
        <input type="text" id="newAdminName" placeholder="Username">
        <label><input type="checkbox" id="canAdd"> Can Add Products</label><br>
        <label><input type="checkbox" id="canDel"> Can Delete Products</label><br>
        <label><input type="checkbox" id="canMan"> Can Manage Store</label>
        <button class="btn btn-main" onclick="saveAdmin()">Save Admin</button>
        <button class="btn" onclick="closeAll()">Close</button>
    </div>

    <div id="addModal" class="modal">
        <h3>New Product</h3>
        <input type="text" id="pName" placeholder="Name">
        <input type="number" id="pPrice" placeholder="Price">
        <input type="file" id="pImg" accept="image/*">
        <input type="file" id="pFile">
        <button id="uploadBtn" class="btn btn-main" onclick="uploadProduct()">Upload</button>
        <button class="btn" onclick="closeAll()">Cancel</button>
    </div>

    <script>
        const S_URL = "https://kdtujvpsscyovmzyvghw.supabase.co";
        const S_KEY = "Sb_publishable__3K83DFvrxoNadCdBSbfig_ZpRi0DjV";
        const _s = supabase.createClient(S_URL, S_KEY);

        let user = null;
        let adminPerms = [];

        async function init() {
            loadTheme();
            await fetchStoreSettings();
            const session = localStorage.getItem('dirt_session');
            if (session) {
                user = JSON.parse(session);
                await fetchAdmins();
                renderUI();
            }
            loadProducts();
        }

        async function fetchStoreSettings() {
            const { data } = await _s.from('store_settings').select('*').single();
            if (data) {
                document.documentElement.style.setProperty('--primary', data.primary_color);
                document.documentElement.style.setProperty('--glow-val', data.glow_power + 'px');
                document.getElementById('storeTitle').innerText = data.name;
                if (data.logo) document.getElementById('storeLogo').src = data.logo;
            }
        }

        async function fetchAdmins() {
            const { data } = await _s.from('admins').select('*');
            adminPerms = data || [];
        }

        function login() {
            const u = document.getElementById('uIn').value.toLowerCase();
            const p = document.getElementById('pIn').value;
            const adm = adminPerms.find(a => a.username === u);

            if (u === 'morad' && p === 'morad-123') user = { name: 'Morad', role: 'owner' };
            else if (adm && p) user = { name: u, role: 'admin', perms: adm };
            else if (u && p) user = { name: u, role: 'user' };
            else return;

            localStorage.setItem('dirt_session', JSON.stringify(user));
            renderUI();
        }

        function renderUI() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('userLabel').innerText = "Hello, " + user.name;
            document.getElementById('adminPanel').classList.remove('hidden');

            if (user.role === 'owner') {
                document.getElementById('storeManageBtn').classList.remove('hidden');
                document.getElementById('adminManageBtn').classList.remove('hidden');
                document.getElementById('addBtn').classList.remove('hidden');
            } else if (user.role === 'admin') {
                if (user.perms.can_man) document.getElementById('storeManageBtn').classList.remove('hidden');
                if (user.perms.can_add) document.getElementById('addBtn').classList.remove('hidden');
            }
        }

        async function loadProducts() {
            const { data } = await _s.from('products').select('*').order('id', { ascending: false });
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';
            data?.forEach(p => {
                const canDel = user && (user.role === 'owner' || (user.role === 'admin' && user.perms.can_del));
                grid.innerHTML += `
                    <div class="card">
                        <img src="${p.img || 'https://via.placeholder.com/200'}">
                        <h3>${p.name}</h3>
                        <p style="color:var(--primary); font-weight:bold;">$${p.price}</p>
                        <button class="btn btn-main" style="width:80%" onclick="downloadFile('${p.file_data}', '${p.name}')">Download</button>
                        ${canDel ? `<button class="btn btn-danger" style="width:80%; font-size:12px;" onclick="deleteProduct(${p.id})">Delete</button>` : ''}
                    </div>`;
            });
        }

        async function saveAdmin() {
            const username = document.getElementById('newAdminName').value.toLowerCase();
            const can_add = document.getElementById('canAdd').checked;
            const can_del = document.getElementById('canDel').checked;
            const can_man = document.getElementById('canMan').checked;
            
            // Check if exists to update, or insert new
            const existing = adminPerms.find(a => a.username === username);
            if (existing) {
                await _s.from('admins').update({ can_add, can_del, can_man }).eq('id', existing.id);
            } else {
                await _s.from('admins').insert([{ username, can_add, can_del, can_man }]);
            }
            location.reload();
        }

        async function openAdminManager() {
            const list = document.getElementById('adminList');
            list.innerHTML = adminPerms.map(a => `
                <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); padding:8px;">
                    <span>${a.username}</span>
                    <div>
                        <button class="btn-main" style="padding:4px 8px; font-size:10px;" onclick="editAdm('${a.username}')">Edit</button>
                        <button class="btn-danger" style="padding:4px 8px; font-size:10px;" onclick="removeAdmin(${a.id})">X</button>
                    </div>
                </div>`).join('');
            document.getElementById('adminModal').style.display='block';
            document.getElementById('overlay').style.display='block';
        }

        function editAdm(name) {
            const a = adminPerms.find(x => x.username === name);
            document.getElementById('newAdminName').value = a.username;
            document.getElementById('canAdd').checked = a.can_add;
            document.getElementById('canDel').checked = a.can_del;
            document.getElementById('canMan').checked = a.can_man;
        }

        async function updateStoreSettings() {
            const updateObj = {
                name: document.getElementById('setStoreName').value,
                primary_color: document.getElementById('setStoreColor').value,
                glow_power: document.getElementById('setStoreGlow').value
            };
            const logo = document.getElementById('setStoreLogo').files[0];
            if (logo) updateObj.logo = await toB64(logo);
            await _s.from('store_settings').update(updateObj).eq('id', 1);
            location.reload();
        }

        async function uploadProduct() {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const img = await toB64(document.getElementById('pImg').files[0]);
            const file = document.getElementById('pFile').files[0] ? await toB64(document.getElementById('pFile').files[0]) : null;
            await _s.from('products').insert([{ name, price, img, file_data: file }]);
            location.reload();
        }

        async function deleteProduct(id) { if(confirm("Sure?")) { await _s.from('products').delete().eq('id', id); loadProducts(); } }
        async function removeAdmin(id) { await _s.from('admins').delete().eq('id', id); location.reload(); }
        function downloadFile(b64, name) { if(!b64 || b64 === 'null') return alert("No file!"); const a = document.createElement('a'); a.href = b64; a.download = name; a.click(); }
        const toB64 = f => new Promise((res, rej) => { const r = new FileReader(); r.readAsDataURL(f); r.onload = () => res(r.result); r.onerror = e => rej(e); });
        function toggleSidebar() { const s = document.getElementById('sidebar'); s.classList.toggle('active'); document.getElementById('overlay').style.display = s.classList.contains('active') ? 'block' : 'none'; }
        function toggleMode() { const d = document.body.classList.toggle('dark-mode'); localStorage.setItem('dirt_theme', d ? 'dark' : 'light'); document.getElementById('themeToggle').innerText = d ? '🌙' : '☀️'; }
        function loadTheme() { if (localStorage.getItem('dirt_theme') === 'dark') { document.body.classList.add('dark-mode'); document.getElementById('themeToggle').innerText = '🌙'; } }
        function closeAll() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); document.getElementById('sidebar').classList.remove('active'); document.getElementById('overlay').style.display = 'none'; }
        function openStoreManager() { document.getElementById('storeModal').style.display='block'; document.getElementById('overlay').style.display='block'; }
        function showAddModal() { document.getElementById('addModal').style.display='block'; document.getElementById('overlay').style.display='block'; }
        function logout() { localStorage.removeItem('dirt_session'); location.reload(); }
    </script>
</body>
</html>
