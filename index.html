<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dirt Store Pro - Secure Hybrid Edition</title>
    <style>
        :root {
            --primary: rgb(46, 139, 87);
            --danger: rgb(220, 53, 69);
            --bg: rgb(26, 26, 26);
            --card: rgb(45, 45, 45);
            --text: rgb(244, 244, 244);
            --nav-bg: rgb(35, 35, 35);
            --border: rgb(68, 68, 68);
        }

        [data-theme="light"] {
            --bg: rgb(245, 245, 245);
            --card: rgb(255, 255, 255);
            --text: rgb(30, 30, 30);
            --nav-bg: rgb(220, 220, 220);
            --border: rgb(200, 200, 200);
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: 0.3s; }
        .navbar { background: var(--nav-bg); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .menu-btn { font-size: 24px; cursor: pointer; background: none; border: none; color: var(--text); }
        .theme-btn { background: var(--primary); color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }

        .sidebar { position: fixed; left: -260px; top: 0; width: 250px; height: 100vh; background: var(--card); transition: left 0.3s ease; box-shadow: 2px 0 10px rgba(0,0,0,0.5); z-index: 1000; padding-top: 60px; border-right: 1px solid var(--border); }
        .sidebar.open { left: 0; }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 24px; cursor: pointer; background: none; border: none; color: var(--text); }
        .sidebar-item { padding: 15px 20px; display: block; color: var(--text); text-decoration: none; font-size: 18px; border-bottom: 1px solid var(--border); cursor: pointer; }
        .sidebar-item:hover { background: var(--nav-bg); }

        .container { padding: 20px; text-align: center; }
        .hidden { display: none !important; }

        .panel { background: var(--card); padding: 25px; border-radius: 12px; max-width: 400px; margin: 20px auto; border: 1px solid var(--border); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); box-sizing: border-box; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px; cursor: pointer; width: 100%; border-radius: 8px; font-weight: bold; margin-top: 10px; }
        .btn-danger { background: var(--danger); }
        .btn:disabled { background: gray; cursor: not-allowed; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; }
        .item-card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); position: relative; }
        .item-card img { width: 100%; height: 160px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; }
        
        #uploadStatus, #adminStatus { font-weight: bold; color: var(--primary); margin-top: 10px; }
    </style>
</head>
<body>

    <div class="navbar">
        <button class="menu-btn" id="openMenu">☰</button>
        <h2 style="margin:0;">Dirt Store</h2>
        <button class="theme-btn" id="toggleTheme">Theme</button>
    </div>

    <div class="sidebar" id="sidebar">
        <button class="close-btn" id="closeMenu">×</button>
        <div class="sidebar-item" id="btnGoStore">Store Home</div>
        <div class="sidebar-item hidden" id="btnGoAdmin">Admin Upload</div>
        <div class="sidebar-item hidden" id="btnGoManage">Manage Admins</div>
        <div class="sidebar-item" id="btnGoLogin">Login</div>
        <div class="sidebar-item hidden" id="btnLogOut">Logout</div>
    </div>

    <div class="container">
        
        <div id="secLogin" class="panel hidden">
            <h3>Admin Login</h3>
            <input type="email" id="logEmail" placeholder="Email">
            <input type="password" id="logPass" placeholder="Password">
            <button class="btn" id="btnLoginAction">Sign In</button>
        </div>

        <div id="secManage" class="panel hidden">
            <h3>Add New Admin</h3>
            <p style="font-size:12px; color:gray;">Add others who can upload items</p>
            <input type="email" id="newAdminEmail" placeholder="New Admin Email">
            <input type="password" id="newAdminPass" placeholder="New Admin Password">
            <button class="btn" id="btnAddAdminAction">Register Admin</button>
            <div id="adminStatus"></div>
        </div>

        <div id="secUpload" class="panel hidden">
            <h3>Upload New Product (Powered by Supabase Storage)</h3>
            <input type="text" id="pName" placeholder="Product Name">
            <input type="number" id="pPrice" placeholder="Price ($)">
            <p style="text-align:left; font-size:12px; margin:5px;">Image (Local or URL):</p>
            <input type="file" id="pImgFile" accept="image/*">
            <input type="text" id="pImgURL" placeholder="Or enter Image URL">
            <p style="text-align:left; font-size:12px; margin:5px;">Minecraft File (.schem/.zip):</p>
            <input type="file" id="pFile">
            <button class="btn" id="btnStartUpload">Upload to Hybrid Server</button>
            <div id="uploadStatus"></div>
        </div>

        <div id="secStore">
            <div class="grid" id="productGrid"></div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const firebaseConfig = {
            apiKey: "AIzaSyDKKTRIOY7pU8pwQLtcp9KLc5_vZ1hujhQ",
            authDomain: "dirtstore-abe3b.firebaseapp.com",
            projectId: "dirtstore-abe3b",
            storageBucket: "dirtstore-abe3b.firebasestorage.app",
            messagingSenderId: "126536114565",
            appId: "1:126536114565:web:2b22f79697abe53355e4ec"
        };

        const app = initializeApp(firebaseConfig);
        const secondaryApp = initializeApp(firebaseConfig, "Secondary");
        
        const db = getFirestore(app);
        const auth = getAuth(app);
        const secondaryAuth = getAuth(secondaryApp);

        // Supabase Client Initialization (Powered by your Key)
        const supabaseUrl = 'https://nimidighcuwhsiuyuftg.supabase.co'
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5pbWlkaWdoY3V3aHNpdXl1ZnRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1OTQxMDgsImV4cCI6MjA4OTE3MDEwOH0.MKgIaWwhj5dDLq5fo9VKWRdg9geeaID9E05BxSqmB40'; // sb_publishable Key
        const supabase = createClient(supabaseUrl, supabaseKey)

        let userAccount = null;

        // UI Logic
        const sidebar = document.getElementById('sidebar');
        const showSec = (id) => {
            ['secLogin', 'secUpload', 'secStore', 'secManage'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            sidebar.classList.remove('open');
        };

        document.getElementById('openMenu').onclick = () => sidebar.classList.add('open');
        document.getElementById('closeMenu').onclick = () => sidebar.classList.remove('open');
        document.getElementById('btnGoStore').onclick = () => showSec('secStore');
        document.getElementById('btnGoAdmin').onclick = () => showSec('secUpload');
        document.getElementById('btnGoManage').onclick = () => showSec('secManage');
        document.getElementById('btnGoLogin').onclick = () => showSec('secLogin');
        document.getElementById('btnLogOut').onclick = () => signOut(auth);

        // Auth Observer
        onAuthStateChanged(auth, (user) => {
            userAccount = user;
            document.getElementById('btnGoAdmin').classList.toggle('hidden', !user);
            document.getElementById('btnGoManage').classList.toggle('hidden', !user);
            document.getElementById('btnLogOut').classList.toggle('hidden', !user);
            document.getElementById('btnGoLogin').classList.toggle('hidden', !!user);
            if(!user) showSec('secStore');
        });

        // Register New Admin (Secondary Auth)
        document.getElementById('btnAddAdminAction').onclick = async () => {
            const email = document.getElementById('newAdminEmail').value;
            const pass = document.getElementById('newAdminPass').value;
            const status = document.getElementById('adminStatus');
            if(!email || !pass) return alert("Enter email and password!");
            
            try {
                await createUserWithEmailAndPassword(secondaryAuth, email, pass);
                status.innerText = "Admin Added Successfully!";
                document.getElementById('newAdminEmail').value = "";
                document.getElementById('newAdminPass').value = "";
            } catch (err) { alert(err.message); }
        };

        // Login
        document.getElementById('btnLoginAction').onclick = async () => {
            const email = document.getElementById('logEmail').value;
            const pass = document.getElementById('logPass').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
                showSec('secStore');
            } catch (err) { alert("Invalid Credentials"); }
        };

        // Upload Product (Powered by Supabase Storage)
        document.getElementById('btnStartUpload').onclick = async () => {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const imgFile = document.getElementById('pImgFile').files[0];
            const imgURL = document.getElementById('pImgURL').value;
            const dataFile = document.getElementById('pFile').files[0];
            const status = document.getElementById('uploadStatus');
            const uploadBtn = document.getElementById('btnStartUpload');

            if(!name || !price || (!imgFile && !imgURL) || !dataFile) return alert("يرجى ملء جميع البيانات!");

            uploadBtn.disabled = true;
            status.innerText = "Starting Hybrid Upload...";

            try {
                let finalImgUrl = imgURL;

                // 1. التعامل مع الصورة (رفعها لسوبابيس أو استخدام الرابط)
                if(imgFile) {
                    status.innerText = "Uploading Image to Supabase...";
                    const imgPath = `images/${Date.now()}_${imgFile.name}`;
                    const { data: imgData, error: imgError } = await supabase.storage
                        .from('dirt-assets') // تأكد من اسم الـ Bucket هنا
                        .upload(imgPath, imgFile)

                    if (imgError) throw imgError;
                    
                    const { data: imgUrlData } = supabase.storage
                        .from('dirt-assets')
                        .getPublicUrl(imgPath)
                    finalImgUrl = imgUrlData.publicUrl;
                }

                // 2. رفع ملف الماين كرافت لسوبابيس
                status.innerText = "Uploading Minecraft File to Supabase...";
                const filePath = `files/${Date.now()}_${dataFile.name}`;
                const { data: fileData, error: fileError } = await supabase.storage
                    .from('dirt-assets') // تأكد من اسم الـ Bucket هنا
                    .upload(filePath, dataFile);

                if (fileError) throw fileError;

                const { data: fileUrlData } = supabase.storage
                    .from('dirt-assets')
                    .getPublicUrl(filePath)
                const finalFileUrl = fileUrlData.publicUrl;

                // 3. حفظ الروابط في Firebase Firestore
                status.innerText = "Saving Data to Firebase Firestore...";
                await addDoc(collection(db, "products"), {
                    name, 
                    price, 
                    img: finalImgUrl, 
                    file: finalFileUrl, 
                    filePath: filePath, // نحفظ المسار للحذف لاحقاً
                    createdAt: new Date()
                });

                status.innerText = "Hybrid Upload Complete!";
                alert("تم رفع السلعة بنجاح وتخزين ملفاتها على Supabase!");
                location.reload();
            } catch (e) { alert("Error during upload: " + e.message); uploadBtn.disabled = false; }
        };

        // Delete & Display logic (Same as before, adapted for Hybrid)
        window.confirmDelete = async (id, filePath) => {
            if(!userAccount || !confirm("Delete item permanently?")) return;
            try {
                // 1. حذف البيانات من Firestore
                await deleteDoc(doc(db, "products", id));
                
                // 2. حذف ملف الماين كرافت من سوبابيس
                if(filePath) {
                    const { error } = await supabase.storage
                      .from('dirt-assets') // تأكد من اسم الـ Bucket هنا
                      .remove([filePath])
                    if (error) console.log("Error deleting file from Supabase: " + error.message);
                }
                
                alert("Item deleted.");
            } catch (err) { alert("Delete Error: " + err.message); }
        };

        onSnapshot(query(collection(db, "products"), orderBy("createdAt", "desc")), (snap) => {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                grid.innerHTML += `
                    <div class="item-card">
                        <img src="${p.img}" alt="Item">
                        <h3>${p.name}</h3>
                        <p>${p.price}$</p>
                        <button class="btn" onclick="window.open('${p.file}')">Download File</button>
                        ${userAccount ? `<button class="btn btn-danger" onclick="window.confirmDelete('${d.id}', '${p.filePath}')">Delete</button>` : ''}
                    </div>`;
            });
        });

        document.getElementById('toggleTheme').onclick = () => {
            const t = document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            document.body.setAttribute('data-theme', t);
        };
    </script>
</body>
</html>
