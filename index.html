<!DOCTYPE html>
<html lang="en" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dirt Store</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #f8f9fa; --text: #212529; --primary: #2e8b57; --card: #ffffff; --border: #dee2e6; --glow-val: 10px; }
        body.dark-mode { --bg: #121212; --text: #e9ecef; --card: #1e1e1e; --border: #333; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: 0.3s; overflow-x: hidden; }
        header { background: var(--card); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 1000; }
        .host-name { font-size: 26px; font-weight: bold; color: var(--primary); text-shadow: 0 0 var(--glow-val) var(--primary); letter-spacing: 1px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 18px; overflow: hidden; border: 1px solid var(--border); transition: 0.3s; text-align: center; }
        .card img { width: 100%; height: 180px; object-fit: cover; border-bottom: 1px solid var(--border); }
        .card-info { padding: 15px; }
        .sidebar { position: fixed; top: 0; right: -320px; width: 280px; height: 100%; background: var(--card); z-index: 2000; padding: 25px; transition: 0.4s; box-shadow: -5px 0 25px rgba(0,0,0,0.2); }
        .sidebar.active { right: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 1500; backdrop-filter: blur(3px); }
        .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin: 8px 0; transition: 0.2s; }
        .btn-main { background: var(--primary); color: white; }
        .btn-danger { background: #dc3545; color: white; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); box-sizing: border-box; }
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card); padding: 25px; border-radius: 24px; width: 90%; max-width: 450px; z-index: 3000; display: none; box-shadow: 0 20px 50px rgba(0,0,0,0.4); }
        .hidden { display: none !important; }
    </style>
</head>
<body onload="boot()">

    <div id="loginPage" style="display:flex; height:100vh; align-items:center; justify-content:center; padding:20px;">
        <div style="background:var(--card); padding:40px; border-radius:25px; width:100%; max-width:380px; text-align:center; border:1px solid var(--border);">
            <h1 style="color:var(--primary); margin-bottom:20px;">Dirt Store</h1>
            <input type="text" id="uIn" placeholder="Username">
            <input type="password" id="pIn" placeholder="Password">
            <button class="btn btn-main" onclick="attemptLogin()">Login</button>
        </div>
    </div>

    <div id="mainUI" class="hidden">
        <header>
            <button class="btn" style="width:auto; font-size:26px; background:none; color:var(--text);" onclick="toggleSidebar()">☰</button>
            <div class="host-name">Dirt Store</div>
            <button id="themeIco" style="background:none; border:none; font-size:24px; cursor:pointer;" onclick="toggleTheme()">☀️</button>
        </header>

        <div id="overlay" class="overlay" onclick="closeAll()"></div>

        <div id="sidebar" class="sidebar">
            <h3 id="userLabel">Welcome</h3>
            <hr style="border:0; border-top:1px solid var(--border);">
            <div id="adminPanel" class="hidden">
                <button class="btn btn-main" onclick="openModal('adminModal')">إدارة المشرفين</button>
            </div>
            <button class="btn btn-danger" style="margin-top:20px;" onclick="logout()">تسجيل الخروج</button>
        </div>

        <div class="grid" id="productGrid"></div>
        <button id="addFloat" class="btn-main hidden" style="position:fixed; bottom:25px; left:25px; width:65px; height:65px; border-radius:50%; font-size:35px; z-index:1000; border:none; box-shadow: 0 4px 15px rgba(0,0,0,0.3);" onclick="openModal('addModal')">+</button>
    </div>

    <div id="addModal" class="modal">
        <h3>إضافة سلعة جديدة</h3>
        <input type="text" id="pName" placeholder="اسم السلعة (name)">
        <input type="number" id="pPrice" placeholder="السعر (price)">
        <p style="font-size:12px; margin:5px 0;">صورة السلعة (img):</p>
        <input type="file" id="pImg" accept="image/*">
        <p style="font-size:12px; margin:5px 0;">الملف المرفق (file_data):</p>
        <input type="file" id="pFile">
        <button id="uploadBtn" class="btn btn-main" onclick="pushItem()">تأكيد الرفع</button>
        <button class="btn" onclick="closeAll()">إلغاء</button>
    </div>

    <div id="adminModal" class="modal">
        <h3>المشرفين</h3>
        <div id="adminListContainer" style="max-height:150px; overflow-y:auto; margin-bottom:10px; border:1px solid var(--border); border-radius:10px; padding:5px;"></div>
        <input type="text" id="admUser" placeholder="اسم المستخدم">
        <label><input type="checkbox" id="cAdd"> صلاحية الإضافة</label><br>
        <label><input type="checkbox" id="cDel"> صلاحية الحذف</label>
        <button class="btn btn-main" onclick="saveAdminRecord()">حفظ المشرف</button>
        <button class="btn" onclick="closeAll()">إغلاق</button>
    </div>

    <script>
        const DB_URL = "https://kdtujvpsscyovmzyvghw.supabase.co";
        const DB_KEY = "sb_secret_84G_jEX-Qah9TlSpCyzXGA_0Hkjs9i8"; 
        const _db = supabase.createClient(DB_URL, DB_KEY);

        let currentUser = null;
        let admins = [];

        async function boot() {
            loadSavedTheme();
            await syncAdmins();
            const saved = localStorage.getItem('dirt_session');
            if (saved) { currentUser = JSON.parse(saved); renderApp(); }
            loadItems();
        }

        async function syncAdmins() {
            const { data } = await _db.from('admins').select('*');
            admins = data || [];
            updateAdminListUI();
        }

        function attemptLogin() {
            const u = document.getElementById('uIn').value.toLowerCase();
            const p = document.getElementById('pIn').value;
            const adm = admins.find(a => a.username === u);
            if (u === 'morad' && p === 'morad-123') currentUser = { name: 'Morad', role: 'owner' };
            else if (adm && p) currentUser = { name: u, role: 'admin', perms: adm };
            else return alert("بيانات الدخول غير صحيحة");
            localStorage.setItem('dirt_session', JSON.stringify(currentUser));
            renderApp();
        }

        function renderApp() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('mainUI').classList.remove('hidden');
            document.getElementById('userLabel').innerText = "الحساب: " + currentUser.name;
            if (currentUser.role === 'owner') {
                document.getElementById('adminPanel').classList.remove('hidden');
                document.getElementById('addFloat').classList.remove('hidden');
            } else if (currentUser.role === 'admin' && currentUser.perms.can_add) {
                document.getElementById('addFloat').classList.remove('hidden');
            }
        }

        async function pushItem() {
            const btn = document.getElementById('uploadBtn');
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const imgFile = document.getElementById('pImg').files[0];
            const saleFile = document.getElementById('pFile').files[0];

            if(!name || !imgFile) return alert("الرجاء تعبئة الاسم واختيار صورة!");
            btn.innerText = "جاري الرفع..."; btn.disabled = true;

            try {
                const img = await toBase64(imgFile);
                const file_data = saleFile ? await toBase64(saleFile) : null;
                
                const { error } = await _db.from('products').insert([{ 
                    name: name, 
                    price: price, 
                    img: img, 
                    file_data: file_data 
                }]);

                if(error) throw error;
                
                closeAll();
                await loadItems();
                alert("تمت الإضافة بنجاح!");
            } catch (e) { 
                alert("خطأ: تأكد من وجود الأعمدة (name, price, img, file_data) في Supabase");
                console.error(e);
            }
            btn.innerText = "تأكيد الرفع"; btn.disabled = false;
        }

        async function loadItems() {
            const { data } = await _db.from('products').select('*').order('id', { ascending: false });
            const grid = document.getElementById('productGrid');
            grid.innerHTML = data?.map(p => {
                const canDel = currentUser && (currentUser.role === 'owner' || (currentUser.role === 'admin' && currentUser.perms.can_del));
                return `
                <div class="card">
                    <img src="${p.img}">
                    <div class="card-info">
                        <h4 style="margin:0;">${p.name}</h4>
                        <p style="color:var(--primary); font-weight:bold; margin:5px 0;">$${p.price}</p>
                        <button class="btn btn-main" onclick="downloadArc('${p.file_data}', '${p.name}')">تحميل</button>
                        ${canDel ? `<button class="btn btn-danger" style="padding:5px; font-size:10px;" onclick="killItem(${p.id})">حذف</button>` : ''}
                    </div>
                </div>`;
            }).join('') || '<p>لا يوجد سلع حالياً.</p>';
        }

        async function killItem(id) { if(confirm("هل أنت متأكد من الحذف؟")) { await _db.from('products').delete().eq('id', id); loadItems(); } }

        async function saveAdminRecord() {
            const username = document.getElementById('admUser').value.toLowerCase();
            const perms = { username, can_add: document.getElementById('cAdd').checked, can_del: document.getElementById('cDel').checked };
            const existing = admins.find(a => a.username === username);
            if (existing) await _db.from('admins').update(perms).eq('id', existing.id);
            else await _db.from('admins').insert([perms]);
            await syncAdmins(); alert("تم تحديث قائمة المشرفين");
        }

        function updateAdminListUI() {
            document.getElementById('adminListContainer').innerHTML = admins.map(a => `<div style="font-size:12px; padding:5px; display:flex; justify-content:space-between; border-bottom:1px solid var(--border);"><span>${a.username}</span><span style="color:red; cursor:pointer;" onclick="deleteAdmin(${a.id})">إزالة</span></div>`).join('');
        }

        async function deleteAdmin(id) { await _db.from('admins').delete().eq('id', id); syncAdmins(); }

        const toBase64 = f => new Promise((res) => { const r = new FileReader(); r.readAsDataURL(f); r.onload = () => res(r.result); });
        function downloadArc(b, n) { if(!b || b === 'null') return alert("لا يوجد ملف مرفق لهذه السلعة"); const a = document.createElement('a'); a.href = b; a.download = n; a.click(); }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('overlay').style.display = 'block'; }
        function openModal(id) { document.getElementById(id).style.display = 'block'; document.getElementById('overlay').style.display = 'block'; }
        function closeAll() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); document.getElementById('sidebar').classList.remove('active'); document.getElementById('overlay').style.display = 'none'; }
        function toggleTheme() { const d = document.body.classList.toggle('dark-mode'); localStorage.setItem('dirt_theme', d ? 'dark' : 'light'); document.getElementById('themeIco').innerText = d ? '🌙' : '☀️'; }
        function loadSavedTheme() { if(localStorage.getItem('dirt_theme') === 'dark') { document.body.classList.add('dark-mode'); document.getElementById('themeIco').innerText = '🌙'; } }
        function logout() { localStorage.removeItem('dirt_session'); location.reload(); }
    </script>
</body>
</html>
