<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dirt Store | Premium Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2eb857;
            --primary-light: #4ade80;
            --primary-glow: rgba(46, 184, 87, 0.3);
            --danger: #ff4d4d;
            --bg-dark: #080808;
            --card-glass: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-dark);
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.7)), url('background.png');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: var(--text);
            margin: 0;
            overflow-x: hidden;
        }

        /* --- Navbar --- */
        .navbar {
            backdrop-filter: blur(25px);
            background: rgba(0,0,0,0.7);
            padding: 15px 5%;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid rgba(46, 184, 87, 0.3);
            position: sticky; top: 0; z-index: 1000;
        }

        .nav-logo { font-weight: 800; font-size: 1.6rem; letter-spacing: -1px; display: flex; align-items: center; }
        .logo-green { color: var(--primary); text-shadow: 0 0 15px var(--primary-glow); margin-left: 5px; }

        .discord-glow {
            height: 38px; cursor: pointer; transition: var(--transition);
            filter: drop-shadow(0 0 10px #7289da);
            animation: pulseGlow 2s infinite alternate;
        }
        @keyframes pulseGlow {
            from { filter: drop-shadow(0 0 5px #7289da); transform: scale(1); }
            to { filter: drop-shadow(0 0 18px #7289da); transform: scale(1.08); }
        }

        /* --- Sidebar المحدث (دائري وأصغر) --- */
        .sidebar {
            position: fixed; left: -260px; top: 20px; bottom: 20px; width: 240px;
            background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(40px);
            transition: var(--transition); z-index: 2000; 
            padding-top: 50px; border-radius: 40px;
            border: 1px solid var(--primary);
            box-shadow: 20px 0 50px rgba(0,0,0,0.8);
        }
        .sidebar.open { left: 20px; }
        [dir="rtl"] .sidebar { left: auto; right: -260px; }
        [dir="rtl"] .sidebar.open { right: 20px; left: auto; }

        .sidebar-item {
            padding: 15px 25px; margin: 5px 15px; border-radius: 20px;
            color: #ccc; transition: var(--transition); cursor: pointer;
            display: flex; align-items: center; gap: 12px; font-weight: 500; font-size: 0.9rem;
        }
        .sidebar-item:hover { background: var(--primary-glow); color: var(--primary-light); transform: scale(1.05); }

        /* --- Loading System --- */
        .loading-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%; background: #000;
            z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center;
            visibility: hidden; opacity: 0; transition: 0.5s;
        }
        .loading-overlay.active { visibility: visible; opacity: 1; }
        .load-bar-bg { width: 220px; height: 4px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-top: 25px; overflow: hidden; }
        .load-bar-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.4s; }

        /* --- UI Components --- */
        .container { padding: 50px 5%; max-width: 1350px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 35px; margin-top: 50px; }
        
        .item-card {
            background: var(--card-glass); backdrop-filter: blur(20px); border-radius: 35px;
            padding: 28px; border: 1px solid rgba(255,255,255,0.08); transition: var(--transition);
            display: flex; flex-direction: column; position: relative;
        }
        .item-card:hover { transform: translateY(-12px); border-color: var(--primary); }
        .item-card img { width: 100%; height: 210px; object-fit: cover; border-radius: 25px; margin-bottom: 20px; }

        .btn {
            background: linear-gradient(135deg, var(--primary), #1e7a3a);
            color: white; border: none; padding: 16px; border-radius: 18px;
            cursor: pointer; width: 100%; font-weight: 800; transition: var(--transition);
            text-transform: uppercase;
        }
        .btn:hover { transform: translateY(-3px); filter: brightness(1.1); }

        .price-tag { background: rgba(46, 184, 87, 0.1); color: var(--primary-light); padding: 6px 14px; border-radius: 12px; font-weight: 900; }
        input, textarea, select { width: 100%; padding: 16px; margin: 12px 0; border-radius: 15px; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); color: white; outline: none; }
        
        .get-counter { text-align: center; margin-top: 15px; font-size: 13px; color: var(--primary-light); opacity: 0.8; }
        .hidden { display: none !important; }
        .panel { background: rgba(255,255,255,0.02); padding: 40px; border-radius: 35px; border: 1px solid rgba(255,255,255,0.05); }
        
        /* Label for file inputs */
        .file-label { display: block; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 12px; cursor: pointer; text-align: center; border: 1px dashed var(--primary); margin-top: 10px; }
    </style>
</head>
<body>

    <div class="loading-overlay" id="loader">
        <h1 class="nav-logo">DIRT<span class="logo-green">STORE</span></h1>
        <div class="load-bar-bg"><div class="load-bar-fill" id="loadBar"></div></div>
    </div>

    <nav class="navbar">
        <div class="nav-logo">
            <span id="openBtn" style="cursor:pointer; margin-right: 15px;">☰</span>
            DIRT<span class="logo-green">STORE</span>
        </div>
        <img src="dis.png" class="discord-glow" onclick="window.open('https://discord.gg/NBXEbp67C', '_blank')">
    </nav>

    <div class="sidebar" id="sidebar">
        <div style="padding: 10px 20px; text-align: right;"><span id="closeBtn" style="cursor:pointer; font-size: 20px; opacity: 0.5;">✕</span></div>
        <div class="sidebar-item" onclick="navTo('secStore')">🏠 <span data-i18n="nav_store">Home</span></div>
        <div class="sidebar-item hidden" id="navUpload" onclick="navTo('secUpload')">📤 <span data-i18n="nav_upload">Publish</span></div>
        <div class="sidebar-item hidden" id="navManage" onclick="navTo('secManage')">⚙️ <span data-i18n="nav_manage">Admin</span></div>
        <div class="sidebar-item" id="navLogin" onclick="navTo('secLogin')">🔑 <span data-i18n="nav_login">Login</span></div>
        <div class="sidebar-item hidden" id="btnLogout" style="color:var(--danger); margin-top: 20px;">Sign Out</div>
    </div>

    <div class="container">
        <div id="secStore" class="section-view">
            <div style="text-align:center; margin-bottom: 60px;">
                <h1 style="font-size: 3rem; margin:0; font-weight: 800;" data-i18n="market_title">Marketplace</h1>
                <div style="max-width: 600px; margin: 30px auto;">
                    <input type="text" id="mainSearch" data-i18n="search_ph" placeholder="Search products...">
                </div>
            </div>
            <div class="grid" id="marketGrid"></div>
        </div>

        <div id="secUpload" class="section-view hidden">
            <div class="panel">
                <div id="listView">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
                        <h2 style="margin:0;">Control Panel</h2>
                        <button class="btn" style="width:auto; padding: 12px 25px;" onclick="toggleCreate(true)">+ Create Product</button>
                    </div>
                    <div id="myProductsList"></div>
                </div>
                <div id="createView" class="hidden">
                    <button class="btn" style="width:auto; margin-bottom:30px; background: #222;" onclick="toggleCreate(false)">⬅ Back</button>
                    <h2>New Premium Asset</h2>
                    <select id="assetType" onchange="adjustUploadForm(this.value)">
                        <option value="photo">Direct Image</option>
                        <option value="code">Skript/Code Paste</option>
                        <option value="file">File (Zip/Schematic/Plugin)</option>
                    </select>
                    
                    <input type="text" id="assetName" placeholder="Product Title">
                    <input type="number" id="assetPrice" placeholder="Price (0 = Free)">
                    
                    <label class="file-label" id="imgLabel">🖼️ Select Product Thumbnail (Image File)
                        <input type="file" id="assetImgFile" accept="image/*" class="hidden">
                    </label>

                    <textarea id="assetCode" class="hidden" rows="6" placeholder="Paste Code Content..."></textarea>
                    
                    <label class="file-label hidden" id="fileLabel">📁 Select Asset File
                        <input type="file" id="assetFile" class="hidden">
                    </label>

                    <button class="btn" id="doPublish" style="margin-top:20px;">Deploy Now</button>
                </div>
            </div>
        </div>

        <div id="secLogin" class="section-view hidden">
            <div class="panel" style="max-width: 450px; margin: 60px auto;">
                <h2 style="text-align:center;">Staff Login</h2>
                <input type="email" id="emailInp" placeholder="Email">
                <input type="password" id="passInp" placeholder="Password">
                <button class="btn" id="doLogin">Login</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

        const firebaseConfig = {
            apiKey: "AIzaSyDKKTRIOY7pU8pwQLtcp9KLc5_vZ1hujhQ",
            authDomain: "dirtstore-abe3b.firebaseapp.com",
            projectId: "dirtstore-abe3b",
            storageBucket: "dirtstore-abe3b.firebasestorage.app",
            messagingSenderId: "126536114565",
            appId: "1:126536114565:web:2b22f79697abe53355e4ec"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const supabase = createClient('https://nimidighcuwhsiuyuftg.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5pbWlkaWdoY3V3aHNpdXl1ZnRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1OTQxMDgsImV4cCI6MjA4OTE3MDEwOH0.MKgIaWwhj5dDLq5fo9VKWRdg9geeaID9E05BxSqmB40');

        let currentLang = 'en';
        let products = [];

        const i18n = {
            en: { nav_store: "Home", nav_upload: "Publish", market_title: "Marketplace", search_ph: "Search products...", free: "FREE", get_now: "Get Now", get_count: "got this" },
            ar: { nav_store: "الرئيسية", nav_upload: "نشر", market_title: "المتجر", search_ph: "ابحث...", free: "مجاناً", get_now: "احصل عليه", get_count: "حصلوا عليه" }
        };

        // --- Core UI ---
        function triggerLoading(callback) {
            const overlay = document.getElementById('loader'); const bar = document.getElementById('loadBar');
            overlay.classList.add('active'); bar.style.width = '0%';
            let w = 0;
            const interval = setInterval(() => {
                w += 20; bar.style.width = w + '%';
                if(w >= 100) { clearInterval(interval); setTimeout(() => { callback(); overlay.classList.remove('active'); }, 300); }
            }, 50);
        }

        window.navTo = (id) => {
            document.querySelectorAll('.section-view').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.getElementById('sidebar').classList.remove('open');
        };

        document.getElementById('openBtn').onclick = () => document.getElementById('sidebar').classList.add('open');
        document.getElementById('closeBtn').onclick = () => document.getElementById('sidebar').classList.remove('open');

        // --- Logic ---
        window.adjustUploadForm = (v) => {
            document.getElementById('assetCode').classList.toggle('hidden', v !== 'code');
            document.getElementById('fileLabel').classList.toggle('hidden', v === 'code' || v === 'photo');
        };

        onAuthStateChanged(auth, user => {
            ['navUpload', 'btnLogout'].forEach(id => document.getElementById(id).classList.toggle('hidden', !user));
            document.getElementById('navLogin').classList.toggle('hidden', !!user);
        });

        document.getElementById('doLogin').onclick = async () => {
            try { await signInWithEmailAndPassword(auth, document.getElementById('emailInp').value, document.getElementById('passInp').value); navTo('secStore'); }
            catch(e) { alert("Access Denied"); }
        };
        document.getElementById('btnLogout').onclick = () => signOut(auth);

        window.toggleCreate = (show) => {
            document.getElementById('listView').classList.toggle('hidden', show);
            document.getElementById('createView').classList.toggle('hidden', !show);
        };

        document.getElementById('doPublish').onclick = async () => {
            const name = document.getElementById('assetName').value;
            const price = document.getElementById('assetPrice').value;
            const type = document.getElementById('assetType').value;
            const code = document.getElementById('assetCode').value;
            const imgFile = document.getElementById('assetImgFile').files[0];
            const assetFile = document.getElementById('assetFile').files[0];

            if(!name || !imgFile) return alert("Title and Thumbnail are required!");

            triggerLoading(async () => {
                // Upload Thumbnail
                const imgPath = `thumbs/${Date.now()}_${imgFile.name}`;
                await supabase.storage.from('dirt-assets').upload(imgPath, imgFile);
                const thumbUrl = (await supabase.storage.from('dirt-assets').getPublicUrl(imgPath)).data.publicUrl;

                // Upload Asset File (if applicable)
                let fUrl = ""; let fPath = "";
                if(assetFile && type !== 'code' && type !== 'photo') {
                    fPath = `assets/${Date.now()}_${assetFile.name}`;
                    await supabase.storage.from('dirt-assets').upload(fPath, assetFile);
                    fUrl = (await supabase.storage.from('dirt-assets').getPublicUrl(fPath)).data.publicUrl;
                }

                await addDoc(collection(db, "products"), {
                    name, price: Number(price), type, img: thumbUrl, codeData: code, file: fUrl, filePath: fPath, downloads: 0, createdAt: new Date()
                });
                toggleCreate(false);
            });
        };

        function renderMarket() {
            const grid = document.getElementById('marketGrid');
            const search = document.getElementById('mainSearch').value.toLowerCase();
            grid.innerHTML = "";
            products.forEach(p => {
                if(p.name.toLowerCase().includes(search)) {
                    const pVal = p.price == 0 ? i18n[currentLang].free : '$'+p.price;
                    grid.innerHTML += `
                        <div class="item-card">
                            <img src="${p.img}">
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                                <h3 style="margin:0;">${p.name}</h3>
                                <span class="price-tag">${pVal}</span>
                            </div>
                            <button class="btn" onclick="handleDownload('${p.id}', '${p.file}', '${p.type}', '${encodeURIComponent(p.codeData || '')}')">Get Now</button>
                            <div class="get-counter">✨ ${p.downloads || 0} ${i18n[currentLang].get_count}</div>
                        </div>`;
                }
            });
        }

        window.handleDownload = async (id, url, type, code) => {
            const key = `got_${id}`;
            if(!localStorage.getItem(key)) {
                await updateDoc(doc(db, "products", id), { downloads: increment(1) });
                localStorage.setItem(key, "true");
            }
            if(type === 'code') {
                navigator.clipboard.writeText(decodeURIComponent(code));
                alert("Code Copied!");
            } else { window.open(url, '_blank'); }
        };

        onSnapshot(query(collection(db, "products"), orderBy("createdAt", "desc")), snap => {
            products = snap.docs.map(d => ({id: d.id, ...d.data()}));
            renderMarket();
        });

        document.getElementById('mainSearch').oninput = renderMarket;
    </script>
</body>
</html>
