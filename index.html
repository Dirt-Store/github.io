<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dirt Store | Premium Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2eb857;
            --primary-light: #4ade80;
            --primary-glow: rgba(46, 184, 87, 0.3);
            --danger: #ff4d4d;
            --bg-dark: #080808;
            --card-glass: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-dark);
            /* تحسين وضوح الخلفية باستخدام تدرج أخف */
            background-image: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.75)), url('background.png');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: var(--text);
            margin: 0;
            overflow-x: hidden;
        }

        /* --- Navbar & Logo --- */
        .navbar {
            backdrop-filter: blur(25px);
            background: rgba(0,0,0,0.7);
            padding: 15px 5%;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(46, 184, 87, 0.2);
            position: sticky; top: 0; z-index: 1000;
        }

        .nav-logo { font-weight: 800; font-size: 1.6rem; letter-spacing: -1px; }
        .logo-green { color: var(--primary); text-shadow: 0 0 10px var(--primary-glow); }

        /* توهج دائم لأيقونة الديسكورد */
        .discord-glow {
            height: 38px; cursor: pointer; transition: var(--transition);
            filter: drop-shadow(0 0 8px #7289da);
            animation: pulseGlow 2s infinite alternate;
        }
        @keyframes pulseGlow {
            from { filter: drop-shadow(0 0 5px #7289da); transform: scale(1); }
            to { filter: drop-shadow(0 0 15px #7289da); transform: scale(1.05); }
        }

        /* --- Sidebar --- */
        .sidebar {
            position: fixed; left: -320px; top: 0; width: 300px; height: 100vh;
            background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(40px);
            transition: var(--transition); z-index: 2000; padding-top: 80px;
            border-right: 2px solid var(--primary);
        }
        .sidebar.open { left: 0; box-shadow: 30px 0 60px rgba(0,0,0,0.9); }
        [dir="rtl"] .sidebar { left: auto; right: -320px; border-right: none; border-left: 2px solid var(--primary); }
        [dir="rtl"] .sidebar.open { right: 0; left: auto; }

        .sidebar-item {
            padding: 18px 30px; margin: 8px 15px; border-radius: 15px;
            color: #ccc; transition: var(--transition); cursor: pointer;
            display: flex; align-items: center; gap: 15px; font-weight: 500;
        }
        .sidebar-item:hover { background: var(--primary-glow); color: var(--primary-light); transform: translateX(10px); }

        /* --- Loading System --- */
        .loading-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%; background: #000;
            z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center;
            visibility: hidden; opacity: 0; transition: 0.5s;
        }
        .loading-overlay.active { visibility: visible; opacity: 1; }
        .load-bar-bg { width: 200px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-top: 20px; overflow: hidden; }
        .load-bar-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.4s; }

        /* --- Language Popup --- */
        .modal-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85);
            z-index: 3000; display: flex; justify-content: center; align-items: center;
            visibility: hidden; opacity: 0; transition: 0.3s;
        }
        .modal-overlay.active { visibility: visible; opacity: 1; }
        .modal-card {
            background: #151515; padding: 40px; border-radius: 30px; border: 1px solid var(--primary);
            text-align: center; width: 90%; max-width: 400px; transform: scale(0.8); transition: 0.3s;
        }
        .modal-overlay.active .modal-card { transform: scale(1); }

        /* --- UI Components --- */
        .container { padding: 50px 5%; max-width: 1300px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 35px; margin-top: 50px; }
        
        .item-card {
            background: var(--card-glass); backdrop-filter: blur(15px); border-radius: 30px;
            padding: 25px; border: 1px solid rgba(255,255,255,0.08); transition: var(--transition);
        }
        .item-card:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .item-card img { width: 100%; height: 210px; object-fit: cover; border-radius: 20px; margin-bottom: 15px; }

        .btn {
            background: linear-gradient(135deg, var(--primary), #1e7a3a);
            color: white; border: none; padding: 16px; border-radius: 15px;
            cursor: pointer; width: 100%; font-weight: 700; transition: var(--transition);
            text-transform: uppercase;
        }
        .btn:hover { box-shadow: 0 0 20px var(--primary-glow); transform: translateY(-2px); }

        .price-tag { background: var(--primary-glow); color: var(--primary-light); padding: 5px 12px; border-radius: 10px; font-weight: 800; }
        input, textarea, select { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; background: rgba(0,0,0,0.5); border: 1px solid #333; color: white; outline: none; }
        
        .hidden { display: none !important; }
        .panel { background: rgba(255,255,255,0.03); padding: 30px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <div class="loading-overlay" id="loader">
        <h1 class="nav-logo">DIRT<span class="logo-green">STORE</span></h1>
        <div class="load-bar-bg"><div class="load-bar-fill" id="loadBar"></div></div>
    </div>

    <div class="modal-overlay" id="langModal">
        <div class="modal-card">
            <h2 style="margin-top:0;">Select Language | اختر اللغة</h2>
            <div style="display:grid; gap: 15px; margin-top: 30px;">
                <button class="btn" onclick="setLang('en')">English</button>
                <button class="btn" onclick="setLang('ar')">العربية</button>
            </div>
        </div>
    </div>

    <nav class="navbar">
        <div class="nav-logo">
            <span id="openBtn" style="cursor:pointer; margin-right: 15px;">☰</span>
            DIRT<span class="logo-green">STORE</span>
        </div>
        <img src="dis.png" class="discord-glow" onclick="window.open('https://discord.gg/NBXEbp67C', '_blank')">
    </nav>

    <div class="sidebar" id="sidebar">
        <div style="padding: 20px; text-align: right;"><span id="closeBtn" style="cursor:pointer; font-size: 24px;">✕</span></div>
        <div class="sidebar-item" onclick="navTo('secStore')">🏠 <span data-i18n="nav_store">Store Home</span></div>
        <div class="sidebar-item hidden" id="navUpload" onclick="navTo('secUpload')">📤 <span data-i18n="nav_upload">Publish Item</span></div>
        <div class="sidebar-item hidden" id="navManage" onclick="navTo('secManage')">⚙️ <span data-i18n="nav_manage">Admin Panel</span></div>
        <div class="sidebar-item" id="navLogin" onclick="navTo('secLogin')">🔑 <span data-i18n="nav_login">Staff Login</span></div>
        <div class="sidebar-item" onclick="openLangModal()">🌐 <span data-i18n="nav_lang">Language</span></div>
        <div class="sidebar-item hidden" id="btnLogout" style="color:var(--danger); margin-top: 30px;">Sign Out</div>
    </div>

    <div class="container">
        
        <div id="secStore" class="section-view">
            <div style="text-align:center; margin-bottom: 50px;">
                <h1 style="font-size: 3rem; margin:0;" data-i18n="market_title">Marketplace</h1>
                <p style="opacity:0.6;" data-i18n="market_subtitle">Premium Content for DirtMC</p>
                <div style="max-width: 500px; margin: 30px auto;">
                    <input type="text" id="mainSearch" data-i18n="search_ph" placeholder="Search for items...">
                </div>
            </div>
            <div class="grid" id="marketGrid"></div>
        </div>

        <div id="secLogin" class="section-view hidden">
            <div class="panel" style="max-width: 400px; margin: 50px auto;">
                <h2 style="text-align:center;">Staff Access</h2>
                <input type="email" id="emailInp" placeholder="Email">
                <input type="password" id="passInp" placeholder="Password">
                <button class="btn" id="doLogin">Login</button>
            </div>
        </div>

        <div id="secManage" class="section-view hidden">
            <div class="panel">
                <h2>Admin Management</h2>
                <div id="adminRows"></div>
                <hr style="opacity:0.1; margin: 20px 0;">
                <input type="email" id="admEmail" placeholder="New Admin Email">
                <input type="password" id="admPass" placeholder="Password">
                <button class="btn" id="doAddAdmin">Add Admin</button>
            </div>
        </div>

        <div id="secUpload" class="section-view hidden">
            <div class="panel">
                <div id="listView">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                        <h2>My Assets</h2>
                        <button class="btn" style="width:auto; padding: 10px 20px;" onclick="toggleCreate(true)">+ New Asset</button>
                    </div>
                    <div id="myProductsList"></div>
                </div>

                <div id="createView" class="hidden">
                    <button class="btn" style="width:auto; margin-bottom:20px; background: #333;" onclick="toggleCreate(false)">Back</button>
                    <h2>Create Asset</h2>
                    <select id="assetType" onchange="adjustUploadForm(this.value)">
                        <option value="photo">Photo/Image</option>
                        <option value="code">Skript/Code</option>
                        <option value="schematic">Schematic</option>
                        <option value="file">File/Plugin</option>
                    </select>
                    <input type="text" id="assetName" placeholder="Asset Name">
                    <input type="number" id="assetPrice" placeholder="Price">
                    <input type="text" id="assetImg" placeholder="Image URL">
                    <textarea id="assetCode" class="hidden" rows="5" placeholder="Paste Code Here..."></textarea>
                    <input type="file" id="assetFile" class="hidden">
                    <button class="btn" id="doPublish">Publish Now</button>
                </div>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const firebaseConfig = {
            apiKey: "AIzaSyDKKTRIOY7pU8pwQLtcp9KLc5_vZ1hujhQ",
            authDomain: "dirtstore-abe3b.firebaseapp.com",
            projectId: "dirtstore-abe3b",
            storageBucket: "dirtstore-abe3b.firebasestorage.app",
            messagingSenderId: "126536114565",
            appId: "1:126536114565:web:2b22f79697abe53355e4ec"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const supabase = createClient('https://nimidighcuwhsiuyuftg.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5pbWlkaWdoY3V3aHNpdXl1ZnRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1OTQxMDgsImV4cCI6MjA4OTE3MDEwOH0.MKgIaWwhj5dDLq5fo9VKWRdg9geeaID9E05BxSqmB40');

        let currentLang = localStorage.getItem('dirt_lang') || 'en';
        let products = [];

        const i18n = {
            en: { nav_store: "Store Home", nav_upload: "Publish Item", nav_manage: "Admin Panel", nav_login: "Staff Login", nav_lang: "Language", market_title: "Marketplace", market_subtitle: "Exclusive content for our community", search_ph: "Search assets...", free: "FREE" },
            ar: { nav_store: "الرئيسية", nav_upload: "نشر سلعة", nav_manage: "لوحة التحكم", nav_login: "دخول الموظفين", nav_lang: "اللغة", market_title: "المتجر", market_subtitle: "إضافات حصرية لمجتمعنا", search_ph: "ابحث عن السلع...", free: "مجاناً" }
        };

        // --- Core Functions ---
        window.openLangModal = () => document.getElementById('langModal').classList.add('active');
        
        window.setLang = (l) => {
            document.getElementById('langModal').classList.remove('active');
            triggerLoading(() => {
                currentLang = l;
                localStorage.setItem('dirt_lang', l);
                applyLang();
            });
        };

        function triggerLoading(callback) {
            const overlay = document.getElementById('loader');
            const bar = document.getElementById('loadBar');
            overlay.classList.add('active');
            bar.style.width = '0%';
            
            let w = 0;
            const interval = setInterval(() => {
                w += 10;
                bar.style.width = w + '%';
                if(w >= 100) {
                    clearInterval(interval);
                    setTimeout(() => {
                        callback();
                        overlay.classList.remove('active');
                    }, 300);
                }
            }, 50);
        }

        function applyLang() {
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if(i18n[currentLang][key]) el.innerText = i18n[currentLang][key];
            });
            renderMarket();
        }

        window.navTo = (id) => {
            document.querySelectorAll('.section-view').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.getElementById('sidebar').classList.remove('open');
        };

        // --- Sidebar ---
        document.getElementById('openBtn').onclick = () => document.getElementById('sidebar').classList.add('open');
        document.getElementById('closeBtn').onclick = () => document.getElementById('sidebar').classList.remove('open');

        // --- Auth & Admin ---
        onAuthStateChanged(auth, user => {
            ['navUpload', 'navManage', 'btnLogout'].forEach(id => document.getElementById(id).classList.toggle('hidden', !user));
            document.getElementById('navLogin').classList.toggle('hidden', !!user);
            if(user) fetchAdmins();
        });

        async function fetchAdmins() {
            onSnapshot(collection(db, "admins"), snap => {
                const container = document.getElementById('adminRows');
                container.innerHTML = "";
                snap.forEach(a => {
                    container.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px; background:rgba(255,255,255,0.05); margin-top:5px; border-radius:10px;">
                        <span>${a.data().email}</span>
                        <button onclick="delAdmin('${a.id}')" style="color:red; border:none; background:none; cursor:pointer;">Remove</button>
                    </div>`;
                });
            });
        }

        window.delAdmin = async (id) => { if(confirm("Revoke?")) await deleteDoc(doc(db, "admins", id)); };

        document.getElementById('doLogin').onclick = async () => {
            try { await signInWithEmailAndPassword(auth, document.getElementById('emailInp').value, document.getElementById('passInp').value); navTo('secStore'); }
            catch(e) { alert("Error"); }
        };
        document.getElementById('btnLogout').onclick = () => signOut(auth);

        // --- Upload Logic ---
        window.toggleCreate = (show) => {
            document.getElementById('listView').classList.toggle('hidden', show);
            document.getElementById('createView').classList.toggle('hidden', !show);
        };

        window.adjustUploadForm = (v) => {
            document.getElementById('assetCode').classList.toggle('hidden', v !== 'code');
            document.getElementById('assetFile').classList.toggle('hidden', v === 'code' || v === 'photo');
        };

        document.getElementById('doPublish').onclick = async () => {
            const name = document.getElementById('assetName').value;
            const price = document.getElementById('assetPrice').value;
            const img = document.getElementById('assetImg').value;
            const type = document.getElementById('assetType').value;
            const code = document.getElementById('assetCode').value;
            const file = document.getElementById('assetFile').files[0];

            triggerLoading(async () => {
                let fUrl = ""; let fPath = "";
                if(file && type !== 'code' && type !== 'photo') {
                    fPath = `assets/${Date.now()}_${file.name}`;
                    await supabase.storage.from('dirt-assets').upload(fPath, file);
                    fUrl = (await supabase.storage.from('dirt-assets').getPublicUrl(fPath)).data.publicUrl;
                }
                await addDoc(collection(db, "products"), {
                    name, price: Number(price), type, img, codeData: code, file: fUrl, filePath: fPath, downloads: 0, createdAt: new Date()
                });
                toggleCreate(false);
            });
        };

        // --- Render ---
        function renderMarket() {
            const grid = document.getElementById('marketGrid');
            const myContainer = document.getElementById('myProductsList');
            const search = document.getElementById('mainSearch').value.toLowerCase();
            grid.innerHTML = ""; if(myContainer) myContainer.innerHTML = "";

            products.forEach(p => {
                if(auth.currentUser && myContainer) {
                    myContainer.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px; background:rgba(0,0,0,0.2); margin-top:5px; border-radius:10px;">
                        <span>${p.name}</span>
                        <button onclick="delProduct('${p.id}', '${p.filePath}')" style="color:red; border:none; background:none; cursor:pointer;">Delete</button>
                    </div>`;
                }

                if(p.name.toLowerCase().includes(search)) {
                    grid.innerHTML += `
                        <div class="item-card">
                            ${p.img ? `<img src="${p.img}">` : `<div style="height:210px; background:#111; border-radius:20px; display:flex; align-items:center; justify-content:center; color:#555;">No Preview</div>`}
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <h3 style="margin:0;">${p.name}</h3>
                                <span class="price-tag">${p.price == 0 ? i18n[currentLang].free : '$'+p.price}</span>
                            </div>
                            <button class="btn" style="margin-top:15px;" onclick="takeAction('${p.id}', '${p.file}', '${p.type}', '${encodeURIComponent(p.codeData || '')}')">Get Now</button>
                        </div>`;
                }
            });
        }

        window.takeAction = async (id, url, type, code) => {
            if(type === 'code') { navigator.clipboard.writeText(decodeURIComponent(code)); alert("Copied!"); }
            else { window.open(url, '_blank'); }
            await updateDoc(doc(db, "products", id), { downloads: increment(1) });
        };

        window.delProduct = async (id, path) => { if(confirm("Delete?")) { await deleteDoc(doc(db, "products", id)); if(path) await supabase.storage.from('dirt-assets').remove([path]); } };

        onSnapshot(query(collection(db, "products"), orderBy("createdAt", "desc")), snap => {
            products = snap.docs.map(d => ({id: d.id, ...d.data()}));
            renderMarket();
        });

        document.getElementById('mainSearch').oninput = renderMarket;
        applyLang();
    </script>
</body>
</html>
