<!DOCTYPE html>
<html lang="en" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dirt Store | Advanced Archive</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #f8f9fa;
            --text: #212529;
            --primary: #2e8b57;
            --card: #ffffff;
            --border: #dee2e6;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
            --glow-color: rgba(46, 139, 87, 0.6);
        }

        body.dark-mode {
            --bg: #121212;
            --text: #e9ecef;
            --card: #1e1e1e;
            --border: #333333;
            --shadow: 0 4px 12px rgba(0,0,0,0.5);
            --glow-color: rgba(46, 139, 87, 0.9);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            transition: all 0.3s ease;
        }

        header {
            background: var(--card);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: var(--shadow);
        }

        .menu-btn, .theme-btn {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text);
            cursor: pointer;
            padding: 5px;
        }

        .host-name {
            font-size: 22px;
            font-weight: bold;
            color: var(--primary);
            text-align: center;
            text-shadow: 0 0 10px var(--glow-color);
            letter-spacing: 1px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        @media (max-width: 600px) {
            .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; padding: 10px; }
        }

        .card {
            background: var(--card);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid var(--border);
            position: relative;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
        }

        .card:hover { transform: translateY(-5px); }

        .card img { width: 100%; height: 180px; object-fit: cover; }

        @media (max-width: 600px) { .card img { height: 130px; } }

        .card-body { padding: 12px; text-align: center; flex-grow: 1; }

        .btn-action {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 5px;
        }

        .btn-download { background: var(--primary); color: white; }
        .btn-delete { background: #dc3545; color: white; font-size: 12px; margin-top: 10px; }

        /* Sidebar & Modals */
        .sidebar {
            position: fixed;
            top: 0;
            right: -300px;
            width: 260px;
            height: 100%;
            background: var(--card);
            z-index: 2000;
            padding: 20px;
            transition: 0.3s;
            box-shadow: -5px 0 15px rgba(0,0,0,0.2);
        }

        .sidebar.active { right: 0; }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            z-index: 1500;
        }

        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--card);
            padding: 25px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            z-index: 3000;
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            box-sizing: border-box;
        }

        .floating-add {
            position: fixed;
            bottom: 25px;
            left: 25px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            font-size: 30px;
            border: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            cursor: pointer;
            z-index: 1000;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body onload="initApp()">

    <div id="loginSection" style="display: flex; height: 100vh; align-items: center; justify-content: center; padding: 20px;">
        <div style="background: var(--card); padding: 30px; border-radius: 20px; width: 100%; max-width: 350px; text-align: center; border: 1px solid var(--border);">
            <h2 style="color: var(--primary);">Dirt Store Login</h2>
            <input type="text" id="uField" placeholder="Username">
            <input type="password" id="pField" placeholder="Password">
            <button class="btn-action btn-download" onclick="doLogin()">Login</button>
        </div>
    </div>

    <div id="mainSection" class="hidden">
        <header>
            <button class="menu-btn" onclick="toggleSidebar()">☰</button>
            <div class="host-name">Dirt Store</div>
            <button class="theme-btn" id="themeIcon" onclick="cycleTheme()">☀️</button>
        </header>

        <div id="overlay" class="overlay" onclick="closeAll()"></div>

        <div id="sidebar" class="sidebar">
            <h3 id="welcomeMsg">Welcome</h3>
            <hr style="border:0; border-top:1px solid var(--border);">
            <div id="ownerTools" class="hidden">
                <p style="font-size: 14px; color: var(--primary);">Owner Tools:</p>
                <button class="btn-action" style="background: #6c757d; color:white;" onclick="showAdminModal()">Add Admin</button>
            </div>
            <button class="btn-action" style="margin-top: 20px; background: #dc3545; color:white;" onclick="doLogout()">Logout</button>
        </div>

        <div class="grid" id="mainGrid"></div>
        <button id="addFloat" class="floating-add hidden" onclick="showAddModal()">+</button>
    </div>

    <div id="itemModal" class="modal">
        <h3>Add New Product</h3>
        <input type="text" id="itemName" placeholder="Product Name">
        <input type="number" id="itemPrice" placeholder="Price">
        <p style="font-size: 12px; margin: 5px 0;">Product Image:</p>
        <input type="file" id="itemImg" accept="image/*">
        <p style="font-size: 12px; margin: 5px 0;">Downloadable File (Script/Pack):</p>
        <input type="file" id="itemFile">
        <button class="btn-action btn-download" id="saveBtn" onclick="uploadProduct()">Save to Archive</button>
        <button class="btn-action" style="background:#888; color:white;" onclick="closeAll()">Cancel</button>
    </div>

    <div id="adminModal" class="modal">
        <h3>Add New Admin</h3>
        <input type="text" id="adminName" placeholder="Admin Username">
        <button class="btn-action btn-download" onclick="addAdminToDB()">Confirm</button>
        <button class="btn-action" style="background:#888; color:white;" onclick="closeAll()">Cancel</button>
    </div>

    <script>
        const S_URL = "https://kdtujvpsscyovmzyvghw.supabase.co";
        const S_KEY = "Sb_publishable__3K83DFvrxoNadCdBSbfig_ZpRi0DjV";
        const _db = supabase.createClient(S_URL, S_KEY);

        let user = null;
        let adminsList = [];

        async function initApp() {
            checkTheme();
            const session = localStorage.getItem('dirt_session');
            if (session) {
                user = JSON.parse(session);
                await syncAdmins();
                renderUI();
            }
            loadItems();
        }

        async function syncAdmins() {
            const { data } = await _db.from('admins').select('username');
            adminsList = data ? data.map(a => a.username) : [];
        }

        function doLogin() {
            const u = document.getElementById('uField').value.toLowerCase();
            const p = document.getElementById('pField').value;

            if (u === 'morad' && p === 'morad-123') {
                user = { name: 'Morad', role: 'owner' };
            } else if (u && p && adminsList.includes(u)) {
                user = { name: u, role: 'admin' };
            } else if (u && p) {
                user = { name: u, role: 'user' };
            } else return;

            localStorage.setItem('dirt_session', JSON.stringify(user));
            renderUI();
        }

        function renderUI() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('mainSection').classList.remove('hidden');
            document.getElementById('welcomeMsg').innerText = "Hello, " + user.name;
            
            if (user.role === 'owner' || user.role === 'admin') {
                document.getElementById('addFloat').classList.remove('hidden');
            }
            if (user.role === 'owner') {
                document.getElementById('ownerTools').classList.remove('hidden');
            }
        }

        async function loadItems() {
            const { data } = await _db.from('products').select('*').order('id', { ascending: false });
            if (!data) return;

            const grid = document.getElementById('mainGrid');
            grid.innerHTML = '';
            data.forEach(item => {
                const canDelete = user && (user.role === 'owner' || user.role === 'admin');
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${item.img || 'https://via.placeholder.com/200'}">
                    <div class="card-body">
                        <h4 style="margin:5px 0;">${item.name}</h4>
                        <p style="color:var(--primary); font-weight:bold; margin:5px 0;">$${item.price}</p>
                        <button class="btn-action btn-download" onclick="downloadLogic('${item.file_data}', '${item.name}')">Download</button>
                        ${canDelete ? `<button class="btn-action btn-delete" onclick="deleteItem(${item.id})">Delete Item</button>` : ''}
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function downloadLogic(base64, name) {
            if (!base64 || base64 === 'null') return alert("No file attached to this item.");
            const link = document.createElement('a');
            link.href = base64;
            link.download = "DirtStore_" + name;
            link.click();
        }

        async function uploadProduct() {
            const name = document.getElementById('itemName').value;
            const price = document.getElementById('itemPrice').value;
            const imgFile = document.getElementById('itemImg').files[0];
            const saleFile = document.getElementById('itemFile').files[0];
            const btn = document.getElementById('saveBtn');

            if (!name || !imgFile) return alert("Name and Image are required!");
            btn.innerText = "Processing...";
            btn.disabled = true;

            const imgBase64 = await toBase64(imgFile);
            const fileBase64 = saleFile ? await toBase64(saleFile) : null;

            const { error } = await _db.from('products').insert([{ 
                name, price, img: imgBase64, file_data: fileBase64 
            }]);

            if (!error) {
                closeAll();
                loadItems();
            }
            btn.innerText = "Save to Archive";
            btn.disabled = false;
        }

        async function deleteItem(id) {
            if (!confirm("Are you sure?")) return;
            await _db.from('products').delete().eq('id', id);
            loadItems();
        }

        async function addAdminToDB() {
            const name = document.getElementById('adminName').value.toLowerCase();
            if (!name) return;
            await _db.from('admins').insert([{ username: name }]);
            alert("Admin Added!");
            closeAll();
            syncAdmins();
        }

        const toBase64 = file => new Promise((res, rej) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => res(reader.result);
            reader.onerror = e => rej(e);
        });

        function cycleTheme() {
            const isDark = document.body.classList.toggle('dark-mode');
            localStorage.setItem('dirt_theme', isDark ? 'dark' : 'light');
            document.getElementById('themeIcon').innerText = isDark ? '🌙' : '☀️';
        }

        function checkTheme() {
            if (localStorage.getItem('dirt_theme') === 'dark') {
                document.body.classList.add('dark-mode');
                document.getElementById('themeIcon').innerText = '🌙';
            }
        }

        function toggleSidebar() { 
            document.getElementById('sidebar').classList.toggle('active'); 
            document.getElementById('overlay').style.display = document.getElementById('sidebar').classList.contains('active') ? 'block' : 'none';
        }

        function showAddModal() { document.getElementById('itemModal').style.display = 'block'; document.getElementById('overlay').style.display = 'block'; }
        function showAdminModal() { document.getElementById('adminModal').style.display = 'block'; document.getElementById('overlay').style.display = 'block'; }
        function closeAll() {
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
            document.getElementById('sidebar').classList.remove('active');
            document.getElementById('overlay').style.display = 'none';
        }
        function doLogout() { localStorage.removeItem('dirt_session'); location.reload(); }
    </script>
</body>
</html>
