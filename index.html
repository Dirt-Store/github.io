<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dirt Store</title>
    <style>
        :root {
            --primary: #2eb857;
            --primary-glow: rgba(46, 184, 87, 0.4);
            --danger: #ff4d4d;
            --bg-dark: #0f0f0f;
            --card-glass: rgba(255, 255, 255, 0.06);
            --text: #f4f4f4;
            --transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="light"] {
            --bg-dark: #f0f2f5;
            --card-glass: rgba(0, 0, 0, 0.05);
            --text: #1a1a1a;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-dark);
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('background.png');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: var(--text);
            margin: 0;
            overflow-x: hidden;
            transition: var(--transition);
        }

        /* Ambient Glow Effect */
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 5% 5%, var(--primary-glow) 0%, transparent 40%),
                        radial-gradient(circle at 95% 95%, var(--primary-glow) 0%, transparent 40%);
            pointer-events: none; z-index: -1;
        }

        /* Navbar */
        .navbar {
            backdrop-filter: blur(20px);
            background: rgba(0,0,0,0.4);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky; top: 0; z-index: 1000;
        }

        .theme-toggle {
            font-size: 26px;
            cursor: pointer;
            transition: var(--transition);
            user-select: none;
        }
        .theme-toggle:hover { transform: scale(1.2) rotate(15deg); }

        /* Sidebar Navigation */
        .sidebar {
            position: fixed; left: -300px; top: 0; width: 280px; height: 100vh;
            background: rgba(10, 10, 10, 0.98);
            backdrop-filter: blur(25px);
            transition: var(--transition);
            z-index: 2000;
            padding-top: 100px;
            border-right: 2px solid var(--primary);
        }
        .sidebar.open { left: 0; box-shadow: 20px 0 50px rgba(0,0,0,0.8); }

        .sidebar-item {
            padding: 18px 30px;
            margin: 10px 20px;
            border-radius: 100px;
            color: var(--text);
            transition: var(--transition);
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .sidebar-item:hover {
            background: var(--primary);
            color: white;
            transform: translateX(15px);
            box-shadow: 0 10px 20px var(--primary-glow);
        }

        /* Main Container & Sections */
        .container { 
            padding: 50px 20px; 
            max-width: 1200px; 
            margin: 0 auto; 
            min-height: 80vh;
        }
        
        .section-view {
            animation: pageIn 0.6s ease-out forwards;
        }

        @keyframes pageIn {
            from { opacity: 0; transform: translateY(20px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        .panel {
            background: var(--card-glass);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 35px;
            border: 1px solid rgba(255,255,255,0.1);
            max-width: 500px;
            margin: 40px auto;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        /* UI Elements */
        input {
            width: 100%; padding: 16px 25px; margin: 15px 0;
            border-radius: 100px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3); color: white;
            outline: none; transition: var(--transition);
            box-sizing: border-box;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 15px var(--primary-glow); }

        .btn {
            background: var(--primary);
            color: white; border: none;
            padding: 16px 30px;
            border-radius: 100px;
            cursor: pointer;
            width: 100%;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: var(--transition);
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px var(--primary-glow);
        }
        .btn:active { transform: scale(0.95); }

        .btn-danger { background: var(--danger); }

        /* Store Design */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 35px;
            margin-top: 40px;
        }

        .item-card {
            background: var(--card-glass);
            backdrop-filter: blur(12px);
            border-radius: 35px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: var(--transition);
            position: relative;
        }
        .item-card:hover {
            transform: translateY(-15px) scale(1.02);
            border-color: var(--primary);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .item-card img {
            width: 100%; height: 220px;
            object-fit: cover; border-radius: 25px;
            margin-bottom: 20px;
        }

        .free-badge {
            background: #2eb857;
            color: white;
            padding: 6px 18px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 900;
            box-shadow: 0 0 20px #2eb857;
            display: inline-block;
            animation: pulseGlow 2.5s infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { transform: scale(1); box-shadow: 0 0 10px #2eb857; }
            50% { transform: scale(1.1); box-shadow: 0 0 25px #2eb857; }
        }

        .admin-list-item {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.4); padding: 15px 20px;
            margin: 10px 0; border-radius: 100px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .hidden { display: none !important; }

        @media (max-width: 768px) {
            .navbar { padding: 15px 20px; }
            .panel { padding: 25px; margin: 10px; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div style="display: flex; align-items: center; gap: 20px;">
            <div class="theme-toggle" id="openMenu">☰</div>
            <h2 style="margin:0; font-weight: 900; letter-spacing: -1.5px; font-size: 26px;">DIRT <span style="color:var(--primary)">Store</span></h2>
        </div>
        <div class="theme-toggle" id="toggleTheme">☀</div>
    </nav>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-item" id="navStore"> Store Home</div>
        <div class="sidebar-item hidden" id="navUpload"> Publish Item</div>
        <div class="sidebar-item hidden" id="navManage"> Admin Panel</div>
        <div class="sidebar-item" id="navLogin"> Staff Login</div>
        <div class="sidebar-item hidden" id="btnLogOut" style="color:var(--danger)"> Sign Out</div>
    </div>

    <div class="container">
        
        <div id="secStore" class="section-view">
            <h1 style="text-align:center; font-size: 3rem; margin-bottom: 10px;">Marketplace</h1>
            <p style="text-align:center; opacity:0.6;">get a best schem and skripts enjoy!</p>
            <div class="grid" id="productGrid"></div>
        </div>

        <div id="secLogin" class="section-view hidden">
            <div class="panel">
                <h2 style="margin-top:0; text-align:center;">Staff Authentication</h2>
                <input type="email" id="logEmail" placeholder="Email Address">
                <input type="password" id="logPass" placeholder="Password">
                <button class="btn" id="btnLoginAction">Secure Login</button>
            </div>
        </div>

        <div id="secManage" class="section-view hidden">
            <div class="panel" style="max-width: 600px;">
                <h2 style="text-align:center;">Admin Management</h2>
                <div id="adminListContainer"></div>
                <hr style="opacity: 0.1; margin: 30px 0;">
                <h3 style="text-align:center;">Hire New Staff</h3>
                <input type="email" id="newAdminEmail" placeholder="New Staff Email">
                <input type="password" id="newAdminPass" placeholder="Temporary Password">
                <button class="btn" id="btnAddAdminAction">Confirm Appointment</button>
            </div>
        </div>

        <div id="secUpload" class="section-view hidden">
            <div class="panel">
                <h2 style="text-align:center;">Publish New Content</h2>
                <input type="text" id="pName" placeholder="Product Title">
                <input type="number" id="pPrice" placeholder="Price (USD) - 0 for Free">
                <p style="margin:10px 0 5px 15px; font-size:12px; opacity:0.5;">Product Cover:</p>
                <input type="file" id="pImgFile" accept="image/*">
                <input type="text" id="pImgURL" placeholder="Or Image Direct Link">
                <p style="margin:10px 0 5px 15px; font-size:12px; opacity:0.5;">Minecraft File (.zip/.schem):</p>
                <input type="file" id="pFile">
                <button class="btn" id="btnStartUpload">Upload to Supabase</button>
                <div id="uploadStatus" style="text-align:center; margin-top:15px; color:var(--primary);"></div>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const firebaseConfig = {
            apiKey: "AIzaSyDKKTRIOY7pU8pwQLtcp9KLc5_vZ1hujhQ",
            authDomain: "dirtstore-abe3b.firebaseapp.com",
            projectId: "dirtstore-abe3b",
            storageBucket: "dirtstore-abe3b.firebasestorage.app",
            messagingSenderId: "126536114565",
            appId: "1:126536114565:web:2b22f79697abe53355e4ec"
        };

        const app = initializeApp(firebaseConfig);
        const secondaryApp = initializeApp(firebaseConfig, "Secondary");
        const db = getFirestore(app);
        const auth = getAuth(app);
        const secondaryAuth = getAuth(secondaryApp);

        const supabase = createClient('https://nimidighcuwhsiuyuftg.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5pbWlkaWdoY3V3aHNpdXl1ZnRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1OTQxMDgsImV4cCI6MjA4OTE3MDEwOH0.MKgIaWwhj5dDLq5fo9VKWRdg9geeaID9E05BxSqmB40');

        let currentUser = null;

        // Navigation Engine
        const showSection = (id) => {
            document.querySelectorAll('.section-view').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.getElementById('sidebar').classList.remove('open');
            window.scrollTo({top: 0, behavior: 'smooth'});
        };

        document.getElementById('navStore').onclick = () => showSection('secStore');
        document.getElementById('navLogin').onclick = () => showSection('secLogin');
        document.getElementById('navUpload').onclick = () => showSection('secUpload');
        document.getElementById('navManage').onclick = () => showSection('secManage');

        // Theme Toggle Logic
        const themeBtn = document.getElementById('toggleTheme');
        themeBtn.onclick = () => {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
            themeBtn.innerText = isDark ? '🌜' : '☀';
            themeBtn.style.transform = "rotate(360deg)";
            setTimeout(() => themeBtn.style.transform = "rotate(0deg)", 500);
        };

        // Auth Logic
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            document.getElementById('navUpload').classList.toggle('hidden', !user);
            document.getElementById('navManage').classList.toggle('hidden', !user);
            document.getElementById('btnLogOut').classList.toggle('hidden', !user);
            document.getElementById('navLogin').classList.toggle('hidden', !!user);
            if(user) fetchAdmins();
            if(!user) showSection('secStore');
        });

        document.getElementById('btnLoginAction').onclick = async () => {
            try {
                await signInWithEmailAndPassword(auth, document.getElementById('logEmail').value, document.getElementById('logPass').value);
                showSection('secStore');
            } catch (e) { alert("Invalid Credentials"); }
        };

        document.getElementById('btnLogOut').onclick = () => signOut(auth);

        // Manage Admins
        function fetchAdmins() {
            onSnapshot(collection(db, "admins"), (snap) => {
                const container = document.getElementById('adminListContainer');
                container.innerHTML = "";
                snap.forEach(d => {
                    container.innerHTML += `
                        <div class="admin-list-item">
                            <span><b>${d.data().email}</b></span>
                            <button class="btn btn-danger" style="width:auto; padding:8px 15px; margin:0;" onclick="window.deleteAdmin('${d.id}')">Fire</button>
                        </div>`;
                });
            });
        }

        window.deleteAdmin = async (id) => {
            if(confirm("Revoke admin access?")) await deleteDoc(doc(db, "admins", id));
        };

        document.getElementById('btnAddAdminAction').onclick = async () => {
            const email = document.getElementById('newAdminEmail').value;
            const pass = document.getElementById('newAdminPass').value;
            try {
                const cred = await createUserWithEmailAndPassword(secondaryAuth, email, pass);
                await setDoc(doc(db, "admins", cred.user.uid), { email });
                alert("New Admin Appointed!");
                document.getElementById('newAdminEmail').value = "";
                document.getElementById('newAdminPass').value = "";
            } catch (e) { alert(e.message); }
        };

        // Upload Logic
        document.getElementById('btnStartUpload').onclick = async () => {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const imgFile = document.getElementById('pImgFile').files[0];
            const imgURL = document.getElementById('pImgURL').value;
            const dataFile = document.getElementById('pFile').files[0];
            const status = document.getElementById('uploadStatus');

            if(!name || price==="" || (!imgFile && !imgURL) || !dataFile) return alert("Fill all data first!");

            status.innerText = "Processing Assets...";
            try {
                let finalImg = imgURL;
                if(imgFile) {
                    const path = `images/${Date.now()}_${imgFile.name}`;
                    await supabase.storage.from('dirt-assets').upload(path, imgFile);
                    finalImg = (await supabase.storage.from('dirt-assets').getPublicUrl(path)).data.publicUrl;
                }

                const filePath = `files/${Date.now()}_${dataFile.name}`;
                await supabase.storage.from('dirt-assets').upload(filePath, dataFile);
                const finalFile = (await supabase.storage.from('dirt-assets').getPublicUrl(filePath)).data.publicUrl;

                await addDoc(collection(db, "products"), {
                    name, price: Number(price), img: finalImg, file: finalFile, filePath, createdAt: new Date()
                });

                alert("Product Published!");
                showSection('secStore');
                location.reload();
            } catch (e) { alert(e.message); }
        };

        // Render Marketplace
        onSnapshot(query(collection(db, "products"), orderBy("createdAt", "desc")), (snap) => {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                const priceBadge = p.price == 0 ? '<span class="free-badge">FREE</span>' : `<span style="font-weight:900; font-size:1.4rem; color:var(--primary)">$${p.price}</span>`;
                grid.innerHTML += `
                    <div class="item-card">
                        <img src="${p.img}" alt="Item">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                            <h3 style="margin:0; font-size:1.5rem;">${p.name}</h3>
                            ${priceBadge}
                        </div>
                        <button class="btn" onclick="window.open('${p.file}')">Get Schematic</button>
                        ${currentUser ? `<button class="btn btn-danger" onclick="window.deleteItem('${d.id}', '${p.filePath}')">Delete</button>` : ''}
                    </div>`;
            });
        });

        window.deleteItem = async (id, path) => {
            if(confirm("Delete permanently?")) {
                await deleteDoc(doc(db, "products", id));
                if(path) await supabase.storage.from('dirt-assets').remove([path]);
            }
        };

        document.getElementById('openMenu').onclick = () => document.getElementById('sidebar').classList.add('open');
    </script>
</body>
</html>
