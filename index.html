<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dirt Store Pro</title>
    <style>
        :root {
            --primary: rgb(46, 139, 87);
            --danger: rgb(220, 53, 69);
            --bg: rgb(26, 26, 26);
            --card: rgb(45, 45, 45);
            --text: rgb(244, 244, 244);
            --nav-bg: rgb(35, 35, 35);
            --border: rgb(68, 68, 68);
        }

        [data-theme="light"] {
            --bg: rgb(245, 245, 245);
            --card: rgb(255, 255, 255);
            --text: rgb(30, 30, 30);
            --nav-bg: rgb(220, 220, 220);
            --border: rgb(200, 200, 200);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            transition: background 0.3s, color 0.3s;
        }

        .navbar {
            background: var(--nav-bg);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .menu-btn {
            font-size: 24px;
            cursor: pointer;
            background: none;
            border: none;
            color: var(--text);
        }

        .theme-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .sidebar {
            position: fixed;
            left: -250px;
            top: 0;
            width: 250px;
            height: 100vh;
            background: var(--card);
            transition: left 0.3s ease;
            box-shadow: 2px 0 5px rgba(0,0,0,0.5);
            z-index: 1000;
            padding-top: 60px;
            border-right: 1px solid var(--border);
        }

        [data-sidebar="open"] {
            left: 0;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
            background: none;
            border: none;
            color: var(--text);
        }

        .sidebar-item {
            padding: 15px 20px;
            display: block;
            color: var(--text);
            text-decoration: none;
            font-size: 18px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
        }

        .sidebar-item:hover {
            background: var(--nav-bg);
        }

        .container {
            padding: 20px;
            text-align: center;
        }

        .hidden {
            display: none !important;
        }

        .panel {
            background: var(--card);
            padding: 25px;
            border-radius: 10px;
            max-width: 400px;
            margin: 20px auto;
            border: 1px solid var(--border);
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            box-sizing: border-box;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            cursor: pointer;
            width: 100%;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 10px;
        }

        .btn-danger {
            background: var(--danger);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .item-card {
            background: var(--card);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .item-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 5px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <button class="menu-btn" id="openMenuBtn">☰</button>
        <h2>Dirt Store</h2>
        <button class="theme-btn" id="themeToggleBtn">Dark / Light</button>
    </div>

    <div class="sidebar" id="sidebarMenu">
        <button class="close-btn" id="closeMenuBtn">X</button>
        <div class="sidebar-item" id="navStore">Store Home</div>
        <div class="sidebar-item" id="navAdmin">Admin Upload</div>
        <div class="sidebar-item" id="navLogin">Login</div>
        <div class="sidebar-item hidden" id="navLogout">Logout</div>
    </div>

    <div class="container">
        
        <div id="loginSection" class="panel hidden">
            <h3>Admin Login</h3>
            <input type="email" id="adminEmail" placeholder="Email">
            <input type="password" id="adminPass" placeholder="Password">
            <button class="btn" id="loginBtn">Login</button>
            <p id="loginStatus"></p>
        </div>

        <div id="uploadSection" class="panel hidden">
            <h3>Add New Product</h3>
            <input type="text" id="pName" placeholder="Product Name">
            <input type="number" id="pPrice" placeholder="Price">
            <p style="text-align:left;">Image:</p>
            <input type="file" id="pImg" accept="image/*">
            <p style="text-align:left;">File:</p>
            <input type="file" id="pFile">
            <button class="btn" id="upBtn">Upload Product</button>
            <p id="uploadStatus"></p>
        </div>

        <div id="storeSection">
            <h2>Available Products</h2>
            <div class="grid" id="productGrid"></div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDKKTRIOY7pU8pwQLtcp9KLc5_vZ1hujhQ",
            authDomain: "dirtstore-abe3b.firebaseapp.com",
            projectId: "dirtstore-abe3b",
            storageBucket: "dirtstore-abe3b.firebasestorage.app",
            messagingSenderId: "126536114565",
            appId: "1:126536114565:web:2b22f79697abe53355e4ec"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);
        const auth = getAuth(app);

        let currentUser = null;

        const bodyEl = document.body;
        const themeBtn = document.querySelector('[id="themeToggleBtn"]');
        const sidebar = document.querySelector('[id="sidebarMenu"]');
        const openMenuBtn = document.querySelector('[id="openMenuBtn"]');
        const closeMenuBtn = document.querySelector('[id="closeMenuBtn"]');
        
        const loginSection = document.querySelector('[id="loginSection"]');
        const uploadSection = document.querySelector('[id="uploadSection"]');
        const storeSection = document.querySelector('[id="storeSection"]');
        
        const navStore = document.querySelector('[id="navStore"]');
        const navAdmin = document.querySelector('[id="navAdmin"]');
        const navLogin = document.querySelector('[id="navLogin"]');
        const navLogout = document.querySelector('[id="navLogout"]');

        let currentTheme = localStorage.getItem('theme') || 'dark';
        if (currentTheme === 'light') {
            bodyEl.setAttribute('data-theme', 'light');
        }

        themeBtn.onclick = () => {
            if (bodyEl.getAttribute('data-theme') === 'light') {
                bodyEl.removeAttribute('data-theme');
                localStorage.setItem('theme', 'dark');
            } else {
                bodyEl.setAttribute('data-theme', 'light');
                localStorage.setItem('theme', 'light');
            }
        };

        openMenuBtn.onclick = () => sidebar.setAttribute('data-sidebar', 'open');
        closeMenuBtn.onclick = () => sidebar.removeAttribute('data-sidebar');

        const hideAllSections = () => {
            loginSection.classList.add('hidden');
            uploadSection.classList.add('hidden');
            storeSection.classList.add('hidden');
            sidebar.removeAttribute('data-sidebar');
        };

        navStore.onclick = () => { hideAllSections(); storeSection.classList.remove('hidden'); };
        navAdmin.onclick = () => {
            hideAllSections();
            if (currentUser) {
                uploadSection.classList.remove('hidden');
            } else {
                loginSection.classList.remove('hidden');
            }
        };
        navLogin.onclick = () => { hideAllSections(); loginSection.classList.remove('hidden'); };
        navLogout.onclick = () => { signOut(auth); hideAllSections(); storeSection.classList.remove('hidden'); };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                navLogin.classList.add('hidden');
                navLogout.classList.remove('hidden');
                if (!loginSection.classList.contains('hidden')) {
                    loginSection.classList.add('hidden');
                    uploadSection.classList.remove('hidden');
                }
            } else {
                currentUser = null;
                navLogin.classList.remove('hidden');
                navLogout.classList.add('hidden');
                uploadSection.classList.add('hidden');
            }
        });

        document.querySelector('[id="loginBtn"]').onclick = async () => {
            const email = document.querySelector('[id="adminEmail"]').value;
            const pass = document.querySelector('[id="adminPass"]').value;
            const stat = document.querySelector('[id="loginStatus"]');
            
            try {
                stat.innerText = "Logging in...";
                await signInWithEmailAndPassword(auth, email, pass);
                stat.innerText = "Success!";
                document.querySelector('[id="adminEmail"]').value = "";
                document.querySelector('[id="adminPass"]').value = "";
            } catch (err) {
                stat.innerText = "Error: " + err.message;
            }
        };

        window.startUploadProcess = async () => {
            if (!currentUser) return alert("Must be logged in to upload!");

            const nameInput = document.querySelector('[id="pName"]');
            const priceInput = document.querySelector('[id="pPrice"]');
            const imgInput = document.querySelector('[id="pImg"]');
            const fileInput = document.querySelector('[id="pFile"]');
            const upBtn = document.querySelector('[id="upBtn"]');
            const status = document.querySelector('[id="uploadStatus"]');

            const name = nameInput.value;
            const price = priceInput.value;
            const imgFile = imgInput.files[0];
            const dataFile = fileInput.files[0];

            if (!name || !imgFile || !dataFile) return alert("Fill all fields");

            upBtn.disabled = true;
            status.innerText = "Processing...";

            try {
                const imgPath = "images/" + Date.now() + "_" + imgFile.name;
                const imgRef = ref(storage, imgPath);
                await uploadBytesResumable(imgRef, imgFile);
                const imgUrl = await getDownloadURL(imgRef);

                const filePath = "files/" + Date.now() + "_" + dataFile.name;
                const fileRef = ref(storage, filePath);
                const fileTask = uploadBytesResumable(fileRef, dataFile);

                fileTask.on('state_changed',
                    (snap) => {
                        const prog = (snap.bytesTransferred / snap.totalBytes) * 100;
                        status.innerText = "Uploading: " + Math.round(prog) + "%";
                    },
                    (error) => { throw error; },
                    async () => {
                        const fileUrl = await getDownloadURL(fileTask.snapshot.ref);

                        await addDoc(collection(db, "products"), {
                            name: name,
                            price: price || 0,
                            img: imgUrl,
                            imgPath: imgPath,
                            file: fileUrl,
                            filePath: filePath,
                            createdAt: new Date()
                        });

                        status.innerText = "Finished!";
                        nameInput.value = "";
                        priceInput.value = "";
                        imgInput.value = "";
                        fileInput.value = "";
                        upBtn.disabled = false;
                    }
                );
            } catch (err) {
                status.innerText = "Error: " + err.message;
                upBtn.disabled = false;
            }
        };

        document.querySelector('[id="upBtn"]').onclick = window.startUploadProcess;

        window.deleteProduct = async (docId, imgPath, filePath) => {
            if (!currentUser) return alert("Only admins can delete.");
            if (!confirm("Delete product permanently?")) return;
            
            try {
                await deleteDoc(doc(db, "products", docId));
                if (imgPath) await deleteObject(ref(storage, imgPath));
                if (filePath) await deleteObject(ref(storage, filePath));
            } catch (err) {
                alert("Error: " + err.message);
            }
        };

        const productsQuery = query(collection(db, "products"), orderBy("createdAt", "desc"));
        onSnapshot(productsQuery, (snapshot) => {
            const grid = document.querySelector('[id="productGrid"]');
            grid.innerHTML = "";
            snapshot.forEach((docSnap) => {
                const item = docSnap.data();
                const docId = docSnap.id;
                
                let adminBtns = "";
                if (currentUser) {
                    adminBtns = `<button class="btn btn-danger" onclick="window.deleteProduct('${docId}', '${item.imgPath}', '${item.filePath}')">Delete</button>`;
                }
                
                grid.innerHTML += `
                    <div class="item-card">
                        <img src="${item.img}" alt="Item">
                        <h3>${item.name}</h3>
                        <p>Price: ${item.price} USD</p>
                        <button class="btn" onclick="window.open('${item.file}')">Download</button>
                        ${adminBtns}
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
