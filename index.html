<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dirt Store - Ultimate V3</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #2e8b57; --bg: #f4f7f6; --text: #333; --card: #fff; --sidebar: #ffffff; --border: #ddd; }
        .dark-mode { --bg: #1a1a1a; --text: #f4f4f4; --card: #2d2d2d; --sidebar: #252525; --border: #444; }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: 0.3s; }
        
        /* Header & Sidebar */
        header { background: var(--primary); color: white; padding: 15px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .menu-btn { font-size: 24px; cursor: pointer; padding: 0 10px; }
        
        .sidebar { position: fixed; left: -260px; top: 0; width: 250px; height: 100%; background: var(--sidebar); box-shadow: 2px 0 10px rgba(0,0,0,0.2); transition: 0.3s; z-index: 1000; padding: 20px; box-sizing: border-box; border-right: 1px solid var(--border); }
        .sidebar.active { left: 0; }
        .sidebar-item { padding: 15px; border-bottom: 1px solid var(--border); cursor: pointer; font-weight: bold; }
        .sidebar-item:hover { background: var(--primary); color: white; border-radius: 8px; }

        /* Auth */
        .auth-container { display: flex; height: 100vh; align-items: center; justify-content: center; }
        .box { background: var(--card); padding: 30px; border-radius: 15px; width: 90%; max-width: 350px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border: 1px solid var(--border); }
        
        /* Product Grid */
        .container { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); text-align: center; transition: 0.3s; position: relative; }
        .card img { width: 100%; height: 200px; object-fit: cover; border-bottom: 1px solid var(--border); }
        .card-body { padding: 15px; }
        .price-tag { font-weight: bold; color: var(--primary); font-size: 20px; margin: 10px 0; }
        .free { color: #d9534f; }

        /* UI Elements */
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid var(--border); box-sizing: border-box; background: var(--card); color: var(--text); }
        .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; }
        .btn:disabled { background: #888; }
        
        /* Modals */
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card); padding: 25px; border-radius: 15px; width: 90%; max-width: 450px; display: none; z-index: 1001; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 900; backdrop-filter: blur(3px); }
        .hidden { display: none !important; }
    </style>
</head>
<body onload="init()">

    <div id="sidebar" class="sidebar">
        <h2 style="color:var(--primary)">Dirt Store</h2>
        <div class="sidebar-item" onclick="toggleTheme()">🌓 Toggle Mode</div>
        <div id="uploadMenuItem" class="sidebar-item hidden" onclick="showUpload()">📤 Upload Product</div>
        <div class="sidebar-item" onclick="logout()" style="color:red; margin-top:20px;">🚪 Logout</div>
    </div>
    <div id="overlay" class="overlay" onclick="closeAll()"></div>

    <div id="authPage" class="auth-container">
        <div class="box">
            <h2 style="color:var(--primary)">Join Store</h2>
            <input type="text" id="u" placeholder="Your Name">
            <input type="password" id="p" placeholder="Password">
            <button class="btn" onclick="handleJoin()">Join Now</button>
        </div>
    </div>

    <div id="mainPage" class="hidden">
        <header>
            <div class="menu-btn" onclick="toggleSidebar()">☰</div>
            <div style="font-weight:bold; font-size:20px;">Dirt Store</div>
            <div id="userTag" style="font-size:12px; opacity:0.8;"></div>
        </header>
        <div class="container" id="grid"></div>
    </div>

    <div id="uploadModal" class="modal">
        <h3 style="margin-top:0">Upload New Item</h3>
        <input type="text" id="pName" placeholder="Product Name">
        <input type="number" id="pPrice" placeholder="Price (0 = FREE)">
        <label style="display:block; font-size:12px; margin-top:10px;">Display Image:</label>
        <input type="file" id="pImg" accept="image/*">
        <label style="display:block; font-size:12px; margin-top:10px;">The File (Plugin/Map):</label>
        <input type="file" id="pFile">
        <button id="upBtn" class="btn" onclick="upload()">Upload Now</button>
        <button class="btn" style="background:#888" onclick="closeAll()">Cancel</button>
    </div>

    <script>
        // *** Supabase API Config - Integrated as requested ***
        const DB_URL = "https://nimtdighcwhsiuyuftg.supabase.co";
        const DB_KEY = "EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5pbWlkaWdoY3V3aHNpdXl1ZnRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1OTQxMDgsImV4cCI6MjA4OTE3MDEwOH0.MKgIaWwhj5dDLq5fo9VKWRdg9geeaID9E05BxSqmB40";
        const _db = supabase.createClient(DB_URL, DB_KEY);

        function init() {
            if(localStorage.getItem('dirt_mode') === 'dark') document.body.classList.add('dark-mode');
            const user = localStorage.getItem('dirt_user');
            if(user) showDashboard(user);
            loadProducts();
        }

        async function handleJoin() {
            const user = document.getElementById('u').value.trim().toLowerCase();
            const pass = document.getElementById('p').value;
            if(!user || !pass) return alert("Enter Name and Pass!");

            // Check Owner
            if(user === 'morad' && pass === 'morad-123') {
                localStorage.setItem('dirt_role', 'owner');
                return loginSuccess(user);
            }

            // Check if Admin
            const { data } = await _db.from('admins').select('*').eq('username', user).eq('password', pass).single();
            localStorage.setItem('dirt_role', data ? 'admin' : 'member');
            loginSuccess(user);
        }

        function loginSuccess(name) {
            localStorage.setItem('dirt_user', name);
            location.reload();
        }

        function showDashboard(name) {
            document.getElementById('authPage').classList.add('hidden');
            document.getElementById('mainPage').classList.remove('hidden');
            document.getElementById('userTag').innerText = "Logged as: " + name;
            
            const role = localStorage.getItem('dirt_role');
            if(role === 'owner' || role === 'admin') {
                document.getElementById('uploadMenuItem').classList.remove('hidden');
            }
        }

        async function loadProducts() {
            const { data } = await _db.from('products').select('*').order('created_at', {ascending: false});
            const grid = document.getElementById('grid');
            if(data) {
                grid.innerHTML = data.map(i => `
                    <div class="card">
                        <img src="${i.img || ''}">
                        <div class="card-body">
                            <h3>${i.name}</h3>
                            <div class="price-tag">${i.price == 0 ? '<span class="free">FREE</span>' : '$'+i.price}</div>
                            <button class="btn" onclick="downloadFile('${i.file_data}', '${i.name}')">Download File</button>
                            ${localStorage.getItem('dirt_role') === 'owner' ? `<button onclick="deleteItem(${i.id})" style="color:red; background:none; border:none; cursor:pointer; font-size:12px; margin-top:10px;">Delete</button>` : ''}
                        </div>
                    </div>
                `).join('');
            }
        }

        async function upload() {
            const btn = document.getElementById('upBtn');
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value || 0;
            const imgFile = document.getElementById('pImg').files[0];
            const dataFile = document.getElementById('pFile').files[0];

            if(!name || !imgFile || !dataFile) return alert("Please select all files!");
            btn.innerText = "Processing..."; btn.disabled = true;

            try {
                // Resize image to prevent large payload
                const imgB64 = await resizeImage(imgFile);
                // Convert file to Base64
                const fileB64 = await toBase64(dataFile);

                const { error } = await _db.from('products').insert([{ 
                    name, price, img: imgB64, file_data: fileB64 
                }]);

                if(error) throw error;
                alert("Product Uploaded! 🔥");
                location.reload();
            } catch (err) {
                alert("Error during upload. Try smaller files.");
                btn.innerText = "Upload Now"; btn.disabled = false;
            }
        }

        async function deleteItem(id) {
            if(confirm("Delete this?")) {
                await _db.from('products').delete().eq('id', id);
                loadProducts();
            }
        }

        // --- Helpers ---
        function toBase64(file) {
            return new Promise((res) => {
                const r = new FileReader(); r.readAsDataURL(file);
                r.onload = () => res(r.result);
            });
        }

        function resizeImage(file) {
            return new Promise((res) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = 400; canvas.height = 300;
                        canvas.getContext('2d').drawImage(img, 0, 0, 400, 300);
                        res(canvas.toDataURL('image/jpeg', 0.7));
                    }
                };
            });
        }

        function downloadFile(b64, name) {
            if(!b64 || b64 === "null") return alert("No file attached!");
            const a = document.createElement('a');
            a.href = b64;
            a.download = name.replace(/\s+/g, '_');
            a.click();
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('dirt_mode', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        }

        function toggleSidebar() { 
            document.getElementById('sidebar').classList.toggle('active'); 
            document.getElementById('overlay').style.display = document.getElementById('sidebar').classList.contains('active') ? 'block' : 'none';
        }

        function showUpload() { toggleSidebar(); document.getElementById('uploadModal').style.display = 'block'; document.getElementById('overlay').style.display = 'block'; }
        function closeAll() { 
            document.getElementById('sidebar').classList.remove('active');
            document.getElementById('uploadModal').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
