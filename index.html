<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dirt Store - Ultimate</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #2e8b57; --bg: #f4f7f6; --text: #333; --card: #fff; --sidebar: #ffffff; }
        .dark-mode { --bg: #1a1a1a; --text: #f4f4f4; --card: #2d2d2d; --sidebar: #252525; }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: 0.3s; }
        
        /* Header & Sidebar */
        header { background: var(--primary); color: white; padding: 15px; display: flex; align-items: center; justify-content: space-between; sticky; top: 0; z-index: 100; }
        .menu-btn { font-size: 24px; cursor: pointer; padding: 0 10px; }
        
        .sidebar { position: fixed; left: -260px; top: 0; width: 250px; height: 100%; background: var(--sidebar); box-shadow: 2px 0 10px rgba(0,0,0,0.2); transition: 0.3s; z-index: 1000; padding: 20px; box-sizing: border-box; }
        .sidebar.active { left: 0; }
        .sidebar-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; font-weight: bold; }

        /* Auth Box */
        .auth-container { display: flex; height: 100vh; align-items: center; justify-content: center; }
        .box { background: var(--card); padding: 30px; border-radius: 15px; width: 90%; max-width: 350px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        /* Product Cards */
        .container { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid rgba(0,0,0,0.1); text-align: center; padding-bottom: 15px; }
        .card img { width: 100%; height: 180px; object-fit: cover; }
        .price-tag { font-weight: bold; color: var(--primary); font-size: 18px; margin: 10px 0; }
        .free-tag { color: #d9534f; font-weight: bold; }

        /* Global UI */
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; background: var(--card); color: var(--text); }
        .btn { width: 100%; padding: 12px; border-radius: 6px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 900; }
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card); padding: 20px; border-radius: 15px; width: 90%; max-width: 400px; display: none; z-index: 1001; }
    </style>
</head>
<body onload="init()">

    <div id="sidebar" class="sidebar">
        <h3 style="color:var(--primary)">Dirt Store Menu</h3>
        <div class="sidebar-item" onclick="toggleTheme()">🌓 Toggle Mode</div>
        <div class="sidebar-item" onclick="showUpload()">📤 Upload Product</div>
        <div id="adminLink" class="sidebar-item" style="display:none" onclick="alert('Admin Panel Coming Soon')">⚙️ Admin Panel</div>
        <div class="sidebar-item" onclick="logout()" style="color:red">🚪 Logout</div>
    </div>
    <div id="overlay" class="overlay" onclick="closeAll()"></div>

    <div id="authPage" class="auth-container">
        <div class="box">
            <h2 style="color:var(--primary)">Join Dirt Store</h2>
            <input type="text" id="u" placeholder="Any Username">
            <input type="password" id="p" placeholder="Any Password">
            <button class="btn" onclick="handleJoin()">Join Now</button>
        </div>
    </div>

    <div id="mainPage" style="display:none">
        <header>
            <div class="menu-btn" onclick="toggleSidebar()">☰</div>
            <div style="font-weight:bold">Dirt Store</div>
            <div id="userTag" style="font-size:12px"></div>
        </header>
        <div class="container" id="grid"></div>
    </div>

    <div id="uploadModal" class="modal">
        <h3>Upload Item</h3>
        <input type="text" id="pName" placeholder="Product Name">
        <input type="number" id="pPrice" placeholder="Price (0 = FREE)">
        <input type="file" id="pImg" accept="image/*">
        <button id="upBtn" class="btn" onclick="upload()">Upload Now</button>
        <button class="btn" style="background:#888" onclick="closeAll()">Cancel</button>
    </div>

    <script>
        const DB_URL = "https://nimtdighcwhsiuyuftg.supabase.co";
        const DB_KEY = "EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5pbWlkaWdoY3V3aHNpdXl1ZnRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1OTQxMDgsImV4cCI6MjA4OTE3MDEwOH0.MKgIaWwhj5dDLq5fo9VKWRdg9geeaID9E05BxSqmB40";
        const _db = supabase.createClient(DB_URL, DB_KEY);

        function init() {
            if(localStorage.getItem('dirt_mode') === 'dark') document.body.classList.add('dark-mode');
            const user = localStorage.getItem('dirt_user');
            if(user) showDashboard(user);
            loadProducts();
        }

        function handleJoin() {
            const user = document.getElementById('u').value.trim();
            const pass = document.getElementById('p').value;
            if(!user) return alert("Enter a name!");
            
            // Owner Check
            if(user === 'morad' && pass === 'morad-123') {
                localStorage.setItem('dirt_role', 'owner');
            } else {
                localStorage.setItem('dirt_role', 'guest');
            }
            
            localStorage.setItem('dirt_user', user);
            showDashboard(user);
        }

        function showDashboard(name) {
            document.getElementById('authPage').style.display = 'none';
            document.getElementById('mainPage').style.display = 'block';
            document.getElementById('userTag').innerText = "Hi, " + name;
            if(localStorage.getItem('dirt_role') === 'owner') document.getElementById('adminLink').style.display = 'block';
        }

        async function loadProducts() {
            const { data } = await _db.from('products').select('*').order('created_at', {ascending: false});
            const grid = document.getElementById('grid');
            if(data) {
                grid.innerHTML = data.map(i => `
                    <div class="card">
                        <img src="${i.img}">
                        <h3>${i.name}</h3>
                        <div class="price-tag">${i.price == 0 ? '<span class="free-tag">FREE</span>' : '$'+i.price}</div>
                        <button class="btn" style="width:80%" onclick="alert('Downloading...')">Download</button>
                        ${localStorage.getItem('dirt_role') === 'owner' ? `<button onclick="deleteItem(${i.id})" style="color:red; background:none; border:none; cursor:pointer; margin-top:5px;">Delete</button>` : ''}
                    </div>
                `).join('');
            }
        }

        async function upload() {
            const btn = document.getElementById('upBtn');
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value || 0;
            const file = document.getElementById('pImg').files[0];

            if(!name || !file) return alert("Fill data!");
            btn.innerText = "Uploading... (Please wait)"; btn.disabled = true;

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                // Compression logic to prevent "Failed to fetch"
                const img = new Image();
                img.src = reader.result;
                img.onload = async () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 400; canvas.height = 400;
                    canvas.getContext('2d').drawImage(img, 0, 0, 400, 400);
                    const finalImg = canvas.toDataURL('image/jpeg', 0.6);

                    const { error } = await _db.from('products').insert([{ name, price, img: finalImg }]);
                    if(error) alert("Upload Failed!");
                    else { alert("Success!"); location.reload(); }
                }
            };
        }

        async function deleteItem(id) {
            if(confirm("Delete this item?")) {
                await _db.from('products').delete().eq('id', id);
                loadProducts();
            }
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('dirt_mode', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        }

        function toggleSidebar() { 
            document.getElementById('sidebar').classList.toggle('active'); 
            document.getElementById('overlay').style.display = document.getElementById('sidebar').classList.contains('active') ? 'block' : 'none';
        }

        function showUpload() { toggleSidebar(); document.getElementById('uploadModal').style.display = 'block'; document.getElementById('overlay').style.display = 'block'; }
        function closeAll() { 
            document.getElementById('sidebar').classList.remove('active');
            document.getElementById('uploadModal').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
